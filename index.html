// ─── DATE GENERATION ─────────────────────────────────────────────────────────
function generateCycleDates(startDate, frequency, count) {
  const dates = [];
  const d = new Date(startDate + "T12:00:00");
  const intervalDays = frequency === "weekly" ? 7 : frequency === "bi-weekly" ? 14 : 30;
  for (let i = 0; i < count; i++) {
    const dt = new Date(d);
    dt.setDate(d.getDate() + i * intervalDays);
    dates.push(formatDate(dt));
  }
  return dates;
}
function formatDate(d) {
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${months[d.getMonth()]} ${String(d.getDate()).padStart(2,"0")}, ${d.getFullYear()}`;
}
function toInputDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + " 12:00:00");
  if (isNaN(d)) return "";
  return d.toISOString().split("T")[0];
}
function fromInputDate(val) {
  if (!val) return "";
  const d = new Date(val + "T12:00:00");
  return formatDate(d);
}

// ─── SUPABASE: LOAD DATA ON STARTUP ──────────────────────────────────────────
async function loadFromSupabase() {
  if (!SUPABASE_AVAILABLE) {
    console.warn("Supabase not available — running in offline mode with seed data");
    return false;
  }
  try {
    // Load all active groups
    const { data: groups, error: gErr } = await supabase
      .from("groups").select("*").eq("status", "active").order("created_at", {ascending: false});

    if (gErr) { console.error("Error loading groups:", gErr); return false; }

    if (groups && groups.length > 0) {
      const mapGroup = g => ({
        id: g.id, name: g.name, organizer: g.organizer_initials, handAmount: g.hand_amount,
        frequency: g.frequency.charAt(0).toUpperCase() + g.frequency.slice(1),
        startDate: g.dates[0] || g.start_date, endDate: g.dates[g.dates.length-1] || g.end_date,
        dates: g.dates, paidThrough: g.paid_through, openRound: g.open_round, memberCount: 0,
      });
      _state.groups = groups.map(mapGroup);

      const g = groups[0];
      _dbGroupId = g.id;
      _state.activeGroupId = g.id;
      _state.group = _state.groups[0];

      // Load members for this group
      const { data: members, error: mErr } = await supabase
        .from("members").select("*").eq("group_id", g.id).order("payout_slot", {ascending: true});

      if (!mErr && members && members.length > 0) {
        // Load payments for these members
        const memberIds = members.map(m => m.id);
        const { data: payments, error: pErr } = await supabase
          .from("payments").select("*").in("member_id", memberIds);

        // Build payment lookup: member_id -> {round_index: paid}
        const paymentLookup = {};
        if (!pErr && payments) {
          payments.forEach(p => {
            if (!paymentLookup[p.member_id]) paymentLookup[p.member_id] = {};
            paymentLookup[p.member_id][p.round_index] = p.paid ? 1 : 0;
          });
        }

        const numRounds = g.dates.length;
        _state.members = members.map(m => {
          const paidArr = Array(numRounds).fill(0);
          const lookup = paymentLookup[m.id] || {};
          Object.entries(lookup).forEach(([ri, v]) => { paidArr[Number(ri)] = v; });
          const localId = `db_${m.id}`;
          _dbMemberIds[localId] = m.id;
          return {
            id: localId, name: m.name, pay: m.payment_method,
            pi: m.payout_slot, hands: m.hands, paid: paidArr,
          };
        });
        _state.paymentOverrides = {};
        _membersByGroupId[g.id] = _state.members;
        _state.groups = _state.groups.map(gr => gr.id===g.id ? {...gr, memberCount:_state.members.length} : gr);
      }

      // Load submissions
      const { data: subs, error: sErr } = await supabase
        .from("submissions").select("*").eq("group_id", g.id).order("submitted_at", {ascending: true});

      if (!sErr && subs) {
        _state.submissions = subs.map(s => ({
          id: s.id, nickname: s.nickname, payMethod: s.payment_method,
          hands: s.hands, prefs: s.preferences, status: s.status,
          submittedAt: s.submitted_at,
        }));
      }

      _dbReady = true;
      notify();
      setupRealtimeSubscriptions();
      console.log("Loaded from Supabase:", g.name, _state.members.length, "members");
      return true;
    }

    // No group found — seed the database with Harvest Table
    console.log("No group in database. Seeding Harvest Table...");
    return await seedDatabase();
  } catch (err) {
    console.error("Supabase load failed:", err);
    return false;
  }
}

// ─── SUPABASE: REALTIME SUBSCRIPTIONS ────────────────────────────────────────
function setupRealtimeSubscriptions() {
  if (!SUPABASE_AVAILABLE || !_dbReady || !_dbGroupId) return;

  // Tear down any existing channel before creating a new one
  if (_realtimeChannel) {
    supabase.removeChannel(_realtimeChannel);
    _realtimeChannel = null;
  }

  _realtimeChannel = supabase
    .channel(`pardna-group-${_dbGroupId}`)

    // ── Submissions: new onboarding form arrives → inbox updates live ──
    .on('postgres_changes', { event: '*', schema: 'public', table: 'submissions',
        filter: `group_id=eq.${_dbGroupId}` }, (payload) => {
      const { eventType, new: row, old } = payload;
      if (eventType === 'INSERT') {
        const sub = { id: row.id, nickname: row.nickname, payMethod: row.payment_method,
          hands: row.hands, prefs: row.preferences, status: row.status,
          submittedAt: row.submitted_at, message: row.message };
        if (!_state.submissions.find(s => s.id === row.id)) {
          _state = { ..._state, submissions: [..._state.submissions, sub] };
          notify();
        }
      } else if (eventType === 'UPDATE') {
        _state = { ..._state, submissions: _state.submissions.map(s =>
          s.id === row.id ? { ...s, status: row.status } : s) };
        notify();
      } else if (eventType === 'DELETE') {
        _state = { ..._state, submissions: _state.submissions.filter(s => s.id !== old.id) };
        notify();
      }
    })

    // ── Payments: paid status toggled on another device → tracker updates ──
    .on('postgres_changes', { event: '*', schema: 'public', table: 'payments' }, (payload) => {
      const { new: row } = payload;
      if (!row) return;
      // Find which local member owns this payment row
      const localId = Object.keys(_dbMemberIds).find(k => _dbMemberIds[k] === row.member_id);
      if (!localId) return; // Belongs to a different group
      _state = { ..._state, members: _state.members.map(m => {
        if (m.id !== localId) return m;
        const newPaid = [...m.paid];
        newPaid[row.round_index] = row.paid ? 1 : 0;
        return { ...m, paid: newPaid };
      })};
      // Also update the cache
      if (_membersByGroupId[_dbGroupId]) {
        _membersByGroupId[_dbGroupId] = _state.members;
      }
      notify();
    })

    // ── Members: someone added/removed from roster → rebuild member list ──
    .on('postgres_changes', { event: '*', schema: 'public', table: 'members',
        filter: `group_id=eq.${_dbGroupId}` }, async () => {
      // Full reload is safest for member changes (handles payout slot reindexing)
      const { data: members } = await supabase
        .from('members').select('*').eq('group_id', _dbGroupId).order('payout_slot');
      if (!members) return;
      const memberIds = members.map(m => m.id);
      const { data: payments } = await supabase.from('payments').select('*').in('member_id', memberIds);
      const payLookup = {};
      if (payments) payments.forEach(p => {
        if (!payLookup[p.member_id]) payLookup[p.member_id] = {};
        payLookup[p.member_id][p.round_index] = p.paid ? 1 : 0;
      });
      const numRounds = (_state.group.dates || []).length;
      const processed = members.map(m => {
        const paidArr = Array(numRounds).fill(0);
        Object.entries(payLookup[m.id] || {}).forEach(([ri, v]) => { paidArr[Number(ri)] = v; });
        const localId = `db_${m.id}`; _dbMemberIds[localId] = m.id;
        return { id: localId, name: m.name, pay: m.payment_method, pi: m.payout_slot, hands: m.hands, paid: paidArr };
      });
      _membersByGroupId[_dbGroupId] = processed;
      _state = { ..._state, members: processed,
        groups: _state.groups.map(g => g.id===_dbGroupId ? {...g, memberCount:processed.length} : g) };
      notify();
    })

    .subscribe((status) => {
      console.log('Pardna realtime:', status);
    });
}

// ─── SUPABASE: SEED HARVEST TABLE ────────────────────────────────────────────
async function seedDatabase() {
  try {
    const g = INITIAL_GROUP;
    const { data: newGroup, error: gErr } = await supabase.from("groups").insert({
      name: g.name, organizer_name: "Adenike Roberts", organizer_initials: g.organizer,
      hand_amount: g.handAmount, frequency: g.frequency.toLowerCase(),
      start_date: "2025-10-10", end_date: "2026-06-19",
      dates: g.dates, paid_through: g.paidThrough, open_round: g.openRound,
      status: "active",
    }).select().single();

    if (gErr) { console.error("Error seeding group:", gErr); return false; }
    _dbGroupId = newGroup.id;

    // Insert all seed members
    const memberInserts = SEED_MEMBERS.map(m => ({
      group_id: newGroup.id, name: m.name, payment_method: m.pay,
      hands: m.hands, hand_index: 0, payout_slot: m.pi,
    }));
    const { data: newMembers, error: mErr } = await supabase
      .from("members").insert(memberInserts).select();

    if (mErr) { console.error("Error seeding members:", mErr); return false; }

    // Map local IDs to database IDs and insert payment records
    const paymentInserts = [];
    newMembers.forEach((dbm, idx) => {
      const seed = SEED_MEMBERS[idx];
      const localId = `db_${dbm.id}`;
      _dbMemberIds[localId] = dbm.id;
      _state.members[idx] = {..._state.members[idx], id: localId};

      // Create payment records for each round
      seed.paid.forEach((p, ri) => {
        if (p === 1) {
          paymentInserts.push({
            group_id: newGroup.id, member_id: dbm.id,
            round_index: ri, paid: true, paid_at: new Date().toISOString(),
          });
        }
      });
    });

    if (paymentInserts.length > 0) {
      const { error: pErr } = await supabase.from("payments").insert(paymentInserts);
      if (pErr) console.error("Error seeding payments:", pErr);
    }

    _dbReady = true;
    notify();
    console.log("Seeded Harvest Table to Supabase with", newMembers.length, "members");
    return true;
  } catch (err) {
    console.error("Seed failed:", err);
    return false;
  }
}

// These run in the background after local state updates.
// The UI stays fast because it updates locally first, then syncs.

function persistGroup() {
  if (!SUPABASE_AVAILABLE || !_dbReady || !_dbGroupId) return;
  const g = _state.group;
  supabase.from("groups").update({
    name: g.name, hand_amount: g.handAmount,
    frequency: g.frequency.toLowerCase(),
    dates: g.dates, paid_through: g.paidThrough, open_round: g.openRound,

function persistMember(localId) {
  if (!SUPABASE_AVAILABLE || !_dbReady) return;
  const dbId = _dbMemberIds[localId];
  if (!dbId) return;
  const m = _state.members.find(x => x.id === localId);
  if (!m) return;
  supabase.from("members").update({
    name: m.name, payment_method: m.pay,
    payout_slot: m.pi, hands: m.hands,
  }).eq("id", dbId).then(({error}) => {
    if (error) console.error("Error persisting member:", error);
  });
}

function persistPayment(localMemberId, roundIndex, paid) {
  if (!SUPABASE_AVAILABLE || !_dbReady || !_dbGroupId) return;
  const dbMemberId = _dbMemberIds[localMemberId];
  if (!dbMemberId) return;
  supabase.from("payments").upsert({
    group_id: _dbGroupId, member_id: dbMemberId,
    round_index: roundIndex, paid: paid,
    paid_at: paid ? new Date().toISOString() : null,
  }, { onConflict: "member_id,round_index" }).then(({error}) => {
    if (error) console.error("Error persisting payment:", error);
  });
}

// Group editing
function updateGroup(changes) {

}

// Member management
function addMember(member) {
  const tempId = `temp_${Date.now()}`;
  const numRounds = _state.group.dates.length;
  const newMember = {
    id: tempId, ...member,
    pi: _state.members.length,
    paid: Array(numRounds).fill(0),
  };
  _state = {..._state, members: [..._state.members, newMember]};
  notify();

  // Insert into Supabase and get real ID
  if (SUPABASE_AVAILABLE && _dbReady && _dbGroupId) {
    supabase.from("members").insert({
      group_id: _dbGroupId, name: member.name, payment_method: member.pay,
      hands: member.hands || 1, hand_index: 0, payout_slot: newMember.pi,
    }).select().single().then(({data, error}) => {
      if (!error && data) {
        const localId = `db_${data.id}`;
        _dbMemberIds[localId] = data.id;
        _state = {..._state, members: _state.members.map(m =>
          m.id === tempId ? {...m, id: localId} : m
        )};
        notify();
      }
    });
  }
  return newMember;
}

function removeMember(memberId) {
  const dbId = _dbMemberIds[memberId];
  const updated = _state.members.filter(m => m.id !== memberId);
  const reindexed = updated.map((m, i) => ({...m, pi: i}));
  _state = {..._state, members: reindexed};
  notify();

  if (SUPABASE_AVAILABLE && dbId) {
    supabase.from("members").delete().eq("id", dbId).then(({error}) => {
      if (error) console.error("Error deleting member:", error);
    });
    // Update payout_slots for remaining members
    reindexed.forEach(m => persistMember(m.id));
  }
}

function updateMember(memberId, changes) {
  _state = {..._state, members: _state.members.map(m => m.id === memberId ? {...m, ...changes} : m)};
  notify();
  persistMember(memberId);
}

function swapMemberSlots(id1, id2) {
  const m1 = _state.members.find(m => m.id === id1);
  const m2 = _state.members.find(m => m.id === id2);
  if (!m1 || !m2) return;
  const pi1 = m1.pi, pi2 = m2.pi;
  _state = {..._state, members: _state.members.map(m => {
    if (m.id === id1) return {...m, pi: pi2};
    if (m.id === id2) return {...m, pi: pi1};
    return m;
  })};
  notify();
  persistMember(id1);
  persistMember(id2);
}

function moveMemberToSlot(memberId, targetSlotIndex) {
  const mover = _state.members.find(m => m.id === memberId);
  if (!mover) return;
  const occupant = _state.members.find(m => m.pi === targetSlotIndex && m.id !== memberId);
  const oldSlot = mover.pi;
  _state = {..._state, members: _state.members.map(m => {
    if (m.id === memberId) return {...m, pi: targetSlotIndex};
    if (occupant && m.id === occupant.id) return {...m, pi: oldSlot};
    return m;
  })};
  notify();
  persistMember(memberId);
  if (occupant) persistMember(occupant.id);
  return occupant;
}

// Add rounds to the group (extend the cycle)
function addRounds(count) {
  const g = _state.group;
  const lastDate = g.dates[g.dates.length - 1];
  const freq = g.frequency.toLowerCase();
  const newDates = generateCycleDates(lastDate, freq, count + 1).slice(1);
  const allDates = [...g.dates, ...newDates];
  _state = {
    ..._state,
    group: {...g, dates: allDates, endDate: allDates[allDates.length - 1]},
    members: _state.members.map(m => ({...m, paid: [...m.paid, ...Array(count).fill(0)]})),
  };
  notify();
  persistGroup();
}

function togglePayment(memberId, roundIndex) {
  const key = `${memberId}-${roundIndex}`;
  const m   = _state.members.find(x => x.id === memberId);
  const cur = _state.paymentOverrides[key] !== undefined ? _state.paymentOverrides[key] : m?.paid[roundIndex]===1;
  const newVal = !cur;
  _state = {..._state, paymentOverrides:{..._state.paymentOverrides,[key]:newVal}};
  notify();
  persistPayment(memberId, roundIndex, newVal);
}
function setPayment(memberId, roundIndex, paid) {
  const key = `${memberId}-${roundIndex}`;
  _state = {..._state, paymentOverrides:{..._state.paymentOverrides,[key]:paid}};

}

function isPaid(memberId, roundIndex) {

}

// ─── SCHEDULE GENERATION ALGORITHM ──────────────────────────────────────────
// Rules:
// 1. Slot 0 (first date) is always the organizer
// 2. First come first served on 1st choices (by submittedAt)
// 3. Multi-hand fairness: guarantee at least one 1st choice per person before
//    giving anyone a second 1st choice. Extra hands fall to 2nd choice, then
//    closest available date to their 1st pick.
// 4. Everyone else: 2nd choice, then closest available.
//
// Returns: { assignments: [{name, pay, hands, handIndex, slotIndex, method}], unassigned: [] }
function generateSchedule(approvedSubs) {
  const g = getGroup();
  const totalSlots = g.dates.length;

  // Slot 0 reserved for organizer
  const taken = new Set([0]);
  const assignments = [{
    name: g.organizer, pay: "Organizer", hands: 1, handIndex: 0,
    slotIndex: 0, method: "organizer", prefFirst: g.dates[0], prefSecond: null,
  }];

  // Sort submissions by submittedAt (first come first served)
  const sorted = [...approvedSubs].sort((a, b) => new Date(a.submittedAt) - new Date(b.submittedAt));

  // Build a flat list of "hand requests" — each hand is a separate request
  // Tag each with its parent submission info
  const handRequests = [];
  sorted.forEach(sub => {
    sub.prefs.forEach((pref, hi) => {
      handRequests.push({
        subId: sub.id,
        name: sub.hands > 1 ? `${sub.nickname} (H${hi+1})` : sub.nickname,
        baseName: sub.nickname,
        pay: sub.payMethod,
        hands: sub.hands,
        handIndex: hi,
        first: pref.first,
        second: pref.second,
        submittedAt: sub.submittedAt,
      });
    });
  });

  function dateToSlot(dateStr) {
    return g.dates.indexOf(dateStr);
  }

  function closestOpen(targetSlot) {
    // Find the nearest open slot to the target
    for (let dist = 1; dist < totalSlots; dist++) {
      if (targetSlot + dist < totalSlots && !taken.has(targetSlot + dist)) return targetSlot + dist;
      if (targetSlot - dist >= 0 && !taken.has(targetSlot - dist)) return targetSlot - dist;
    }
    return -1; // no slots left
  }

  function assign(req, slotIndex, method) {
    taken.add(slotIndex);
    assignments.push({
      name: req.name, pay: req.pay, hands: req.hands, handIndex: req.handIndex,
      slotIndex, method,
      prefFirst: req.first, prefSecond: req.second,
    });
  }

  // ── PASS 1: First choices, one per person (multi-hand fairness) ──
  // Group hand requests by person, give each person their first available 1st-choice
  const personFirstDone = new Set(); // people who got a 1st choice
  const pending = []; // hand requests not yet assigned

  // Process one hand per person for 1st choices
  const byPerson = {};
  handRequests.forEach(req => {
    if (!byPerson[req.baseName]) byPerson[req.baseName] = [];
    byPerson[req.baseName].push(req);
  });

  // First come first served order of people
  const personOrder = sorted.map(s => s.nickname).filter((v, i, a) => a.indexOf(v) === i);

  personOrder.forEach(personName => {
    const reqs = byPerson[personName];
    let gotOne = false;
    for (const req of reqs) {
      const slot = dateToSlot(req.first);
      if (!gotOne && slot >= 0 && !taken.has(slot)) {
        assign(req, slot, "1st choice");
        personFirstDone.add(personName);
        gotOne = true;
      } else {
        pending.push(req);
      }
    }
    // If none of their 1st choices were available, all go to pending
    if (!gotOne) {
      // Already added to pending in the loop above
    }
  });

  // ── PASS 2: Remaining 1st choices for multi-hand people ──
  const stillPending = [];
  pending.forEach(req => {
    const slot = dateToSlot(req.first);
    if (slot >= 0 && !taken.has(slot)) {
      assign(req, slot, "1st choice");
    } else {
      stillPending.push(req);
    }
  });

  // ── PASS 3: 2nd choices ──
  const finalPending = [];
  stillPending.forEach(req => {
    const slot = dateToSlot(req.second);
    if (slot >= 0 && !taken.has(slot)) {
      assign(req, slot, "2nd choice");
    } else {
      finalPending.push(req);
    }
  });

  // ── PASS 4: Closest available to their 1st choice ──
  const unassigned = [];
  finalPending.forEach(req => {
    const targetSlot = dateToSlot(req.first);
    const slot = closestOpen(targetSlot >= 0 ? targetSlot : 0);
    if (slot >= 0) {
      assign(req, slot, "closest available");
    } else {
      unassigned.push(req);
    }
  });

  // Sort assignments by slot index
  assignments.sort((a, b) => a.slotIndex - b.slotIndex);

  return { assignments, unassigned };
}

// Apply a generated schedule: creates/updates members from assignments
async function applySchedule(result) {
  const g = getGroup();
  const numRounds = g.dates.length;

  // Optimistic local update first so UI responds immediately
  const tempMembers = result.assignments.map((a, i) => ({
    id: `m${String(i+1).padStart(2,"0")}_${Date.now()}_${i}`,
    name: a.name, pay: a.pay, pi: a.slotIndex, hands: a.hands,
    paid: Array(numRounds).fill(0),
  }));
  _state = {..._state, members: tempMembers, paymentOverrides: {}};
  notify();

  if (!SUPABASE_AVAILABLE || !_dbReady || !_dbGroupId) return;

  // Delete all existing members for this group
  await supabase.from("members").delete().eq("group_id", _dbGroupId);

  // Insert the newly generated members
  const dbRows = result.assignments.map(a => ({
    group_id: _dbGroupId,
    name: a.name,
    payment_method: a.pay,
    payout_slot: a.slotIndex,
    hands: a.hands,
  }));
  const { data: inserted, error } = await supabase.from("members").insert(dbRows).select();

  if (error) { console.error("Error saving schedule to Supabase:", error); return; }

  if (inserted) {
    // Swap temp local IDs → real DB IDs so future updates hit the right rows
    _dbMemberIds = {};
    const finalMembers = tempMembers.map(m => {
      const dbRow = inserted.find(r => r.payout_slot === m.pi);
      if (!dbRow) return m;
      const localId = `db_${dbRow.id}`;
      _dbMemberIds[localId] = dbRow.id;
      return { ...m, id: localId };
    });
    _membersByGroupId[_dbGroupId] = finalMembers;
    _state = { ..._state, members: finalMembers,
      groups: _state.groups.map(gr => gr.id===_dbGroupId ? {...gr, memberCount:finalMembers.length} : gr) };
    notify();
  }
}
function useStore() {
  const [state, setState] = useState(getState());
  useEffect(() => { const unsub = subscribe(setState); return unsub; }, []);
  return state;
}

  const [loading, setLoading] = useState(true);
  const [dbStatus, setDbStatus] = useState("connecting");
  const [memberId, setMemberIdState] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    const urlId = params.get('member');
    if (urlId) { localStorage.setItem('pardna_member_id', urlId); return urlId; }
    return localStorage.getItem('pardna_member_id') || null;
  });
  const setMemberId = (id) => {
    if (id) localStorage.setItem('pardna_member_id', id);
    else localStorage.removeItem('pardna_member_id');
    setMemberIdState(id);
  };

  useEffect(() => { applyThemeVars(theme); }, [theme]);

  // Load data from Supabase on startup
  useEffect(() => {
    loadFromSupabase().then(success => {
      setDbStatus(success ? "loaded" : "fallback");
      setLoading(false);
    }).catch(() => {
      setDbStatus("fallback");
      setLoading(false);
    });
  }, []);

  const showAlert = msg => { setAlert(msg); setTimeout(()=>setAlert(null),2400); };
  const changeTheme = key => { setTheme(key); applyThemeVars(key); showAlert(`${THEMES[key].name} theme applied`); };

      </div>
    );
  }

  return (
    <div style={s}>
      <Alert msg={alert}/>
      {!alert && (
        <div onClick={()=>{const n=orgTaps+1;setOrgTaps(n);if(n>=3){setOrgTaps(0);setOrgPwInput("");setOrgPwError(false);setShowOrgPw(true);}}} style={{position:"fixed",top:8,right:12,display:"flex",alignItems:"center",gap:5,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(8px)",borderRadius:20,padding:"4px 10px",zIndex:300,cursor:"pointer",userSelect:"none"}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:dbStatus==="loaded"?"#4A9C7A":"#D4882A"}}/>
          <span style={{fontSize:9,color:"rgba(255,255,255,0.6)",fontFamily:"'Jost',sans-serif",fontWeight:500}}>{dbStatus==="loaded"?"Live":"Offline"}</span>
        </div>
      )}
      {/* No bottom bar for members — onboarding is a link inside My View */}
      {/* Organizer mode — exit button in bottom bar */}
      {app === "organizer" && (
        <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:500,display:"flex",justifyContent:"center"}}>
          <div style={{background:"rgba(0,0,0,0.92)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",justifyContent:"flex-end",maxWidth:"var(--app-max-w)",width:"100%",padding:"7px 14px 10px"}}>
            <div onClick={()=>setApp("onboarding")} style={{padding:"4px 14px",borderRadius:8,cursor:"pointer",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)"}}>
              <div style={{fontSize:9,fontWeight:600,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(255,255,255,0.5)"}}>← Exit Organizer</div>
            </div>
          </div>
        </div>
      )}

      {/* Password modal */}
      {showOrgPw && (
        <div style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 28px"}}>
          <div style={{background:"var(--surface)",borderRadius:24,padding:"32px 28px",width:"100%",maxWidth:340,border:"1px solid var(--border)",boxShadow:"0 24px 64px rgba(0,0,0,0.4)"}}>

            <input

              value={orgPwInput}
              onChange={e=>{setOrgPwInput(e.target.value);setOrgPwError(false);}}
              onKeyDown={e=>{
                if(e.key==="Enter"){

                  else{setOrgPwError(true);setOrgPwInput("");}

              }}

              autoFocus

            />

            <div style={{display:"flex",gap:10}}>

              <button onClick={()=>{
                if(orgPwInput==="Ujam44"){setShowOrgPw(false);setApp("organizer");showAlert("Organizer mode unlocked");}
                else{setOrgPwError(true);setOrgPwInput("");}
              }} style={{flex:2,padding:"12px",borderRadius:12,border:"none",background:"var(--header-grad)",color:"white",fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,cursor:"pointer"}}>Unlock</button>
            </div>
          </div>
        </div>
      )}

      <div style={{maxWidth:"var(--app-max-w)",margin:"0 auto",paddingBottom:120}}>
        {app==="organizer"  && <OrganizerApp  theme={theme} changeTheme={changeTheme} showAlert={showAlert}/>}

        {app==="member"     && <MemberApp     theme={theme} changeTheme={changeTheme} showAlert={showAlert} goToOnboard={()=>setApp("onboarding")} memberId={memberId} setMemberId={setMemberId}/>}
      </div>
    </div>
  );
}

function OrganizerApp({theme, changeTheme, showAlert}) {
  const store = useStore();
  const { members, submissions, groups, activeGroupId } = store;
  const [screen, setScreen] = useState("home");

      {screen==="schedule" && <OrgSchedule key={activeGroupId} members={members} goTo={setScreen} openTheme={()=>setShowTheme(true)}/>}
      {screen==="inbox"    && <OrgInbox    key={activeGroupId} pending={pending} submissions={submissions} goTo={setScreen} openTheme={()=>setShowTheme(true)} showAlert={showAlert}/>}
      {screen==="setup"    && <OrgSetup    goTo={setScreen} openTheme={()=>setShowTheme(true)} showAlert={showAlert} theme={theme}/>}
      {screen==="edit"     && <OrgEdit     goTo={setScreen} openTheme={()=>setShowTheme(true)} showAlert={showAlert} theme={theme} initialSection={editInitialSection}/>}
      {screen==="generate" && <OrgGenerate submissions={submissions} goTo={setScreen} openTheme={()=>setShowTheme(true)} showAlert={showAlert} theme={theme}/>}
    </div>
  );
}

              <th style={{position:"sticky",left:0,background:"var(--primary-deep)",fontSize:8,color:"rgba(255,255,255,0.3)",fontWeight:700,padding:"5px 12px",textAlign:"left",minWidth:150,zIndex:5,boxShadow:"2px 0 8px rgba(0,0,0,0.2)"}}>MEMBER</th>
              {visibleCols.map(i=><th key={i} style={{background:"var(--primary-deep)",fontSize:7,color:"rgba(255,255,255,0.3)",fontWeight:700,padding:"5px 2px",textAlign:"center",whiteSpace:"nowrap"}}>{months[i]}</th>)}
            </tr>
            <tr>
              <th style={{position:"sticky",left:0,background:"var(--primary-deep)",fontSize:9,fontWeight:600,color:"rgba(255,255,255,0.5)",padding:"8px 12px",textAlign:"left",minWidth:150,zIndex:5,boxShadow:"2px 0 8px rgba(0,0,0,0.2)"}}>Hand</th>
              {visibleCols.map(i=>(
                <th key={i} onClick={()=>setActiveRound(p=>p===i?null:i)} style={{background:activeRound===i?"var(--accent)":"var(--primary-deep)",fontSize:9,fontWeight:600,color:activeRound===i?"white":i===getGroup().openRound?"var(--gold-light)":"rgba(255,255,255,0.5)",padding:"8px 2px",textAlign:"center",minWidth:42,cursor:"pointer",whiteSpace:"nowrap"}}>{days[i]}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map(m=>(
              <tr key={m.id} style={{background:"inherit"}}>
                <td style={{position:"sticky",left:0,background:"var(--surface)",padding:"10px 12px",fontSize:12,fontWeight:500,color:"var(--text)",whiteSpace:"nowrap",minWidth:150,borderBottom:"1px solid var(--border)",zIndex:4,boxShadow:"2px 0 8px rgba(0,0,0,0.08)"}}>
                  {m.name}
                  <div style={{fontSize:9,color:"var(--accent)",marginTop:2,fontWeight:500}}>{m.pay} · Slot {m.pi+1}</div>
                </td>
                {visibleCols.map(di=>{
                  const isPayoutSlot = m.pi===di;
                  const paid = isPaid(m.id,di);
                  const isOpen = di===getGroup().openRound;
                  return (
                    <td key={di}
                      onMouseDown={(e)=>{e.preventDefault();const nv=!isPaid(m.id,di);setIsDragging(true);setDragValue(nv);togglePayment(m.id,di);}}
                      onMouseEnter={()=>{if(!isDragging)return;const cur=isPaid(m.id,di);if(cur!==dragValue)setPayment(m.id,di,dragValue);}}
                      onMouseUp={()=>setIsDragging(false)}
                      style={{textAlign:"center",verticalAlign:"middle",height:42,width:42,minWidth:42,borderBottom:"1px solid var(--border)",borderRight:"1px solid var(--border)",cursor:"pointer",background:isOpen&&!isPayoutSlot?"rgba(201,144,106,0.04)":"inherit",userSelect:"none"}}>
                      {isPayoutSlot
                        ? <div style={{width:24,height:24,borderRadius:6,background:paid?"var(--green)":"var(--shimmer)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,transition:"background 0.2s"}}>{theme==="rosegold"?"🌸":"💰"}</div>
                        : paid
                          ? <div style={{width:20,height:20,borderRadius:"50%",background:"var(--green)",display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"white",fontWeight:700}}>✓</div>
                          : isOpen
                            ? <div style={{width:20,height:20,borderRadius:"50%",border:"1.5px dashed var(--open-dot)",display:"inline-block"}}/>
                            : <div style={{width:20,height:20,borderRadius:"50%",border:"1.5px solid var(--border)",display:"inline-block"}}/>}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <OrgNav current="grid" goTo={goTo} pendingCount={0}/>
    </div>
  );
}

  return (
    <div>
      <div style={{background:"var(--header-grad)",padding:"54px var(--pad) 32px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",width:220,height:220,borderRadius:"50%",background:"radial-gradient(circle,rgba(201,144,106,0.18) 0%,transparent 70%)",top:-60,right:-60}}/>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,letterSpacing:4,textTransform:"uppercase",color:"var(--gold-light)",marginBottom:6,position:"relative"}}>Pardna</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:34,fontWeight:600,color:"white",lineHeight:1.1,position:"relative"}}>Pot <em style={{color:"var(--gold-light)"}}>Schedule</em></div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginTop:5,fontWeight:300,position:"relative"}}>{getGroup().name} · {getGroup().startDate.replace(/, \d{4}/,"")} – {getGroup().endDate.replace(/, \d{4}/,"")}</div>

      <div style={{margin:"var(--pad) var(--pad) 0",background:"var(--surface)",borderRadius:20,padding:20,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",border:"1px solid var(--border)"}}>
        {[[paidCount,"Paid Out"],[getTotalHands()-paidCount,"Remaining"],[getGroup().endDate.replace(/, \d{4}/,""),"Last Day"]].map(([v,l],i)=>(
          <div key={i} style={i>0?{borderLeft:"1px solid var(--border)",paddingLeft:16}:{}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:"var(--primary)",lineHeight:1}}>{v}</div>
            <div style={{fontSize:10,color:"var(--text-soft)",marginTop:3}}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{padding:"var(--pad) var(--pad) 0"}}>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"var(--text-soft)",marginBottom:13}}>Payout Order</div>
        <div className="resp-grid">
        {members.map(m=>{
          const status = m.pi<=getGroup().paidThrough?"paid":m.pi===getGroup().openRound?"current":"upcoming";
          const memberLink = `${window.location.origin}${window.location.pathname}?member=${m.id}`;
          const copyLink = () => {
            navigator.clipboard.writeText(memberLink).catch(()=>{
              const ta=document.createElement("textarea");ta.value=memberLink;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
            });
          };
          return (
            <div key={m.id} style={{background:"var(--surface)",borderRadius:16,padding:"14px 16px",border:"1px solid var(--border)",marginBottom:9}}>
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:42,height:42,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,flexShrink:0,background:status==="paid"?"var(--green-bg)":status==="current"?"var(--header-grad)":"var(--bg-mid)",color:status==="paid"?"var(--green)":"white"}}>
                  {status==="paid"?"✓":m.pi+1}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600,color:"var(--text)"}}>{m.name}</div>
                  <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2}}>{getDateLabels()[m.pi]} · {status==="paid"?"Disbursed":status==="current"?"This round — open now ✦":"Upcoming"}</div>
                </div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:19,fontWeight:700,color:status==="paid"?"var(--green)":status==="current"?"var(--accent)":"var(--text-soft)",flexShrink:0}}>${getPotValue().toLocaleString()}</div>
              </div>
              <div onClick={copyLink} style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
                <div style={{fontSize:10,color:"var(--text-soft)",fontFamily:"'Jost',sans-serif",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"75%",opacity:0.7}}>?member={m.id}</div>
                <div style={{fontSize:10,fontWeight:600,color:"var(--primary)",fontFamily:"'Jost',sans-serif",flexShrink:0,letterSpacing:"0.05em"}}>Copy Link ↗</div>
              </div>
            </div>
          );
        })}
        </div>
      </div>
      <OrgNav current="schedule" goTo={goTo} pendingCount={0}/>
    </div>
  );
