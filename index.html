// ─── GROUP SETUP SCREEN ───────────────────────────────────────────────────────
function OrgSetup({goTo, openTheme, showAlert, theme}) {
  const [step, setStep]           = useState(1); // 1=details, 2=preview
  const [groupName, setGroupName] = useState("");
  const [handAmount, setHandAmount] = useState("");
  const [frequency, setFrequency] = useState(null);
  const [startDate, setStartDate] = useState("");
  const [numRounds, setNumRounds] = useState(5);
  const [errors, setErrors]       = useState({});
  const [generatedDates, setGeneratedDates] = useState([]);

  const freqOptions = [
    {key:"weekly",    label:"Weekly",    desc:"Every 7 days",  icon:"7"},
    {key:"bi-weekly", label:"Bi-weekly", desc:"Every 14 days", icon:"14"},
    {key:"monthly",   label:"Monthly",   desc:"Once a month",  icon:"30"},
  ];

  const validate = () => {
    const e = {};
    if (!groupName.trim()) e.groupName = "Give your group a name";
    if (!handAmount || isNaN(handAmount) || Number(handAmount) <= 0) e.handAmount = "Enter a valid amount";
    if (!frequency) e.frequency = "Choose a frequency";
    if (!startDate) e.startDate = "Pick a start date";
    if (numRounds < 2 || numRounds > 52) e.numRounds = "Choose between 2 and 52 rounds";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleGenerate = () => {
    if (!validate()) { showAlert("Please complete all fields"); return; }
    const dates = generateCycleDates(startDate, frequency, numRounds);
    setGeneratedDates(dates);
    setStep(2);
  };

  const handleConfirm = () => {
    const group = {
      name: groupName.trim(),
      handAmount: Number(handAmount),
      frequency,
      startDate: fromInputDate(startDate),
      endDate: generatedDates[generatedDates.length - 1],
      dates: generatedDates,
      numRounds,
      createdAt: new Date().toISOString(),
    };
    saveCreatedGroup(group);
    showAlert(`${groupName} created ✦`);
    goTo("home");
  };

  const potPreview = numRounds * Number(handAmount || 0);
  const cyclePreview = numRounds * numRounds * Number(handAmount || 0);

  const hdr = (title, subtitle) => (
    <div style={{background:"var(--header-grad)",padding:"54px var(--pad) 36px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",width:220,height:220,borderRadius:"50%",background:"radial-gradient(circle,rgba(201,144,106,0.18) 0%,transparent 70%)",top:-60,right:-60,pointerEvents:"none"}}/>
      <div style={{position:"absolute",width:140,height:140,borderRadius:"50%",background:"radial-gradient(circle,rgba(196,120,138,0.12) 0%,transparent 70%)",bottom:10,left:-40,pointerEvents:"none"}}/>
      <div onClick={()=>step===2?setStep(1):goTo("home")} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,fontWeight:500,color:"rgba(255,255,255,0.55)",cursor:"pointer",marginBottom:14,position:"relative"}}>← {step===2?"Edit details":"Back"}</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,letterSpacing:4,textTransform:"uppercase",color:"var(--gold-light)",marginBottom:6,position:"relative"}}>Pardna</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:600,color:"white",lineHeight:1.1,position:"relative"}}>{title}</div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginTop:5,fontWeight:300,position:"relative",lineHeight:1.5}}>{subtitle}</div>
      <SettingsBtn onClick={openTheme}/>
      <div style={{position:"absolute",bottom:-1,left:0,right:0,height:24,background:"var(--bg)",borderRadius:"24px 24px 0 0"}}/>
    </div>
  );

  const card = (title, sub, children) => (
    <div style={{background:"var(--surface)",borderRadius:20,padding:22,border:"1px solid var(--border)",margin:"14px var(--pad) 0",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)",borderRadius:"20px 20px 0 0"}}/>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"var(--text)",marginBottom:4,marginTop:4}}>{title}</div>
      <div style={{fontSize:11,color:"var(--text-soft)",marginBottom:18,lineHeight:1.6,fontFamily:"'Jost',sans-serif"}}>{sub}</div>
      {children}
    </div>
  );

  const fieldLabel = (text) => (
    <label style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--text-mid)",marginBottom:8,display:"block",fontFamily:"'Jost',sans-serif"}}>{text}</label>
  );

  const inputStyle = (hasError) => ({
    width:"100%",padding:"13px 15px",border:`1.5px solid ${hasError?"#E05555":"var(--border)"}`,
    borderRadius:13,fontFamily:"'Jost',sans-serif",fontSize:14,color:"var(--text)",
    background:"var(--bg)",outline:"none"
  });

  const errorMsg = (msg) => msg ? <div style={{fontSize:10,color:"#E05555",fontWeight:600,marginTop:4,fontFamily:"'Jost',sans-serif"}}>⚠ {msg}</div> : null;

  // ── STEP 2: PREVIEW ────────────────────────────────────────────────────────
  if (step === 2) {
    const amt = Number(handAmount);
    const lastDate = generatedDates[generatedDates.length - 1];
    return (
      <div>
        {hdr(
          <>{groupName} <em style={{color:"var(--gold-light)"}}>Preview</em></>,
          "Review your generated schedule before confirming."
        )}

        {/* Summary stats */}
        <div style={{margin:"var(--pad) var(--pad) 0",background:"var(--surface)",borderRadius:20,padding:20,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",border:"1px solid var(--border)"}}>
          {[[numRounds,"Rounds"],[`$${amt}`,"Per hand"],[frequency.charAt(0).toUpperCase()+frequency.slice(1),"Frequency"]].map(([v,l],i)=>(
            <div key={i} style={i>0?{borderLeft:"1px solid var(--border)",paddingLeft:16}:{}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:"var(--primary)",lineHeight:1}}>{v}</div>
              <div style={{fontSize:10,color:"var(--text-soft)",marginTop:3}}>{l}</div>
            </div>
          ))}
        </div>

        {/* Timeline info */}
        <div style={{margin:"14px var(--pad) 0",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:10,background:"var(--accent-pale)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>📅</div>
          <div>
            <div style={{fontSize:13,fontWeight:500,color:"var(--primary)",fontFamily:"'Jost',sans-serif"}}>{generatedDates[0]} → {lastDate}</div>
            <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2}}>Full cycle · {numRounds} rounds</div>
          </div>
        </div>

        {/* Pot math */}
        <div style={{margin:"14px var(--pad) 0",background:"var(--header-grad)",borderRadius:20,padding:22,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)"}}/>
          <div style={{position:"absolute",width:150,height:150,borderRadius:"50%",background:"radial-gradient(circle,rgba(255,255,255,0.07) 0%,transparent 70%)",top:-40,right:-40,pointerEvents:"none"}}/>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"rgba(255,255,255,0.5)",marginBottom:14,fontFamily:"'Jost',sans-serif"}}>Pot math preview</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",lineHeight:1.8,fontFamily:"'Jost',sans-serif"}}>
            If all {numRounds} slots fill, each round's pot will be <strong style={{color:"var(--gold-light)",fontFamily:"'Cormorant Garamond',serif",fontSize:16}}>${(numRounds * amt).toLocaleString()}</strong> and the full cycle will move <strong style={{color:"var(--gold-light)",fontFamily:"'Cormorant Garamond',serif",fontSize:16}}>${(numRounds * numRounds * amt).toLocaleString()}</strong>.
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:8,fontFamily:"'Jost',sans-serif"}}>Final numbers depend on how many members join.</div>
        </div>

        {/* Date list */}
        <div style={{padding:"var(--pad) var(--pad) 0"}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"var(--text-soft)",marginBottom:13,fontFamily:"'Jost',sans-serif"}}>Generated Dates</div>
          <div className="resp-grid" style={{display:"flex",flexDirection:"column",gap:8}}>
            {generatedDates.map((d, i) => {
              const label = d.replace(/, \d{4}$/, match => match);
              return (
                <div key={i} style={{background:"var(--surface)",borderRadius:14,padding:"12px 16px",border:"1px solid var(--border)",display:"flex",alignItems:"center",gap:14}}>
                  <div style={{width:34,height:34,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0,background:i===0?"var(--header-grad)":"var(--bg-mid)",color:i===0?"white":"var(--text-soft)",fontFamily:"'Cormorant Garamond',serif"}}>{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:"var(--text)"}}>{d}</div>
                    <div style={{fontSize:10,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>{i===0?"Organizer payout (Slot 1)":"Open slot"}</div>
                  </div>
                  {i===0 && <div style={{fontSize:10,fontWeight:600,padding:"4px 11px",borderRadius:20,background:"var(--accent-pale)",color:"var(--primary)",border:"1px solid var(--border)",fontFamily:"'Jost',sans-serif"}}>You</div>}
                </div>
              );
            })}
          </div>
        </div>

        {/* Confirm button */}
        <div style={{padding:"24px var(--pad) 0"}}>
          <button onClick={handleConfirm} style={{width:"100%",padding:18,background:"var(--header-grad)",color:"white",border:"none",borderRadius:18,fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,cursor:"pointer",boxShadow:"0 8px 24px rgba(0,0,0,0.15)"}}>Confirm &amp; Create Group ✦</button>
          <div style={{fontSize:11,color:"var(--text-soft)",textAlign:"center",marginTop:10,lineHeight:1.5,fontFamily:"'Jost',sans-serif"}}>You can share the onboarding link after creating the group.<br/>Members will submit their preferences through it.</div>
        </div>
      </div>
    );
  }

  // ── STEP 1: DETAILS ────────────────────────────────────────────────────────
  return (
    <div>
      {hdr(
        <>New <em style={{color:"var(--gold-light)"}}>Circle</em></>,
        "Set up your group details. The app will generate your full schedule of dates automatically."
      )}

      {/* Group name */}
      {card("Name your circle", "This is how your group will appear to members.",
        <>
          {fieldLabel("Group name")}
          <input value={groupName} onChange={e=>{setGroupName(e.target.value);setErrors(p=>({...p,groupName:null}));}} placeholder="e.g. Sisterhood Circle" style={inputStyle(errors.groupName)}/>
          {errorMsg(errors.groupName)}
        </>
      )}

      {/* Hand amount */}
      {card("How much per hand?", "Each member pays this amount per hand, per round. Everyone pays the same.",
        <>
          {fieldLabel("Amount per hand")}
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:15,top:"50%",transform:"translateY(-50%)",fontSize:16,fontWeight:600,color:"var(--text-mid)",fontFamily:"'Cormorant Garamond',serif"}}>$</span>
            <input type="number" value={handAmount} onChange={e=>{setHandAmount(e.target.value);setErrors(p=>({...p,handAmount:null}));}} placeholder="100" style={{...inputStyle(errors.handAmount),paddingLeft:32}}/>
          </div>
          {errorMsg(errors.handAmount)}
          {handAmount && Number(handAmount) > 0 && (
            <div style={{display:"flex",gap:8,marginTop:12}}>
              {[["$"+Number(handAmount).toLocaleString(),"Per hand / round"],["$"+(Number(handAmount)*numRounds).toLocaleString(),`Pot if ${numRounds} hands`]].map(([v,l],i)=>(
                <div key={i} style={{flex:1,background:"var(--bg)",borderRadius:12,padding:"10px 12px",border:"1px solid var(--border)"}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:"var(--primary)",lineHeight:1}}>{v}</div>
                  <div style={{fontSize:9,color:"var(--text-soft)",marginTop:3,fontFamily:"'Jost',sans-serif"}}>{l}</div>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {/* Frequency */}
      {card("How often do members pay?", "This sets the rhythm for the whole cycle.",
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
            {freqOptions.map(f=>(
              <div key={f.key} onClick={()=>{setFrequency(f.key);setErrors(p=>({...p,frequency:null}));}} style={{border:`2px solid ${frequency===f.key?"var(--primary)":"var(--border)"}`,borderRadius:14,padding:"16px 8px",textAlign:"center",cursor:"pointer",background:frequency===f.key?"var(--accent-pale)":"var(--bg)"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:"var(--primary)",lineHeight:1}}>{f.icon}</div>
                <div style={{fontSize:12,fontWeight:600,color:frequency===f.key?"var(--primary)":"var(--text)",marginTop:6,fontFamily:"'Jost',sans-serif"}}>{f.label}</div>
                <div style={{fontSize:9,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>{f.desc}</div>
              </div>
            ))}
          </div>
          {errorMsg(errors.frequency)}
        </>
      )}

      {/* Start date */}
      {card("When does the first round start?", "Slot 1 is always reserved for the organizer. Your first payout happens on this date.",
        <>
          {fieldLabel("Start date")}
          <input type="date" value={startDate} onChange={e=>{setStartDate(e.target.value);setErrors(p=>({...p,startDate:null}));}} style={inputStyle(errors.startDate)}/>
          {errorMsg(errors.startDate)}
        </>
      )}

      {/* Number of rounds */}
      {card("How many members have committed?", "Start with however many people have said yes. You can always add more slots later as more people join.",
        <>
          {fieldLabel("Members committed so far")}
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div onClick={()=>numRounds>2&&setNumRounds(n=>n-1)} style={{width:44,height:44,borderRadius:12,border:"1.5px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",background:"var(--bg)",color:"var(--text)",fontWeight:600,userSelect:"none"}}>−</div>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:700,color:"var(--primary)",lineHeight:1}}>{numRounds}</div>
              <div style={{fontSize:10,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>starting slots</div>
            </div>
            <div onClick={()=>numRounds<52&&setNumRounds(n=>n+1)} style={{width:44,height:44,borderRadius:12,border:"1.5px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",background:"var(--bg)",color:"var(--text)",fontWeight:600,userSelect:"none"}}>+</div>
          </div>
          {errorMsg(errors.numRounds)}
          <div style={{marginTop:12,background:"var(--accent-pale)",borderRadius:12,padding:"10px 14px",border:"1px solid var(--border)",display:"flex",gap:8,alignItems:"flex-start"}}>
            <span style={{fontSize:13,flexShrink:0}}>💡</span>
            <div style={{fontSize:11,color:"var(--text-mid)",fontFamily:"'Jost',sans-serif",lineHeight:1.6}}>Not sure of the final count? That's fine — add more slots anytime in <strong>Edit → Rounds</strong> as more members join.</div>
          </div>
          {frequency && startDate && (
            <div style={{marginTop:10,background:"var(--bg)",borderRadius:12,padding:"12px 14px",border:"1px solid var(--border)"}}>
              <div style={{fontSize:11,color:"var(--text-soft)",fontFamily:"'Jost',sans-serif",lineHeight:1.6}}>
                Starting {fromInputDate(startDate)}, your first {numRounds} rounds end around <strong style={{color:"var(--primary)"}}>{generateCycleDates(startDate, frequency, numRounds).pop()}</strong>.
              </div>
            </div>
          )}
        </>
      )}

      {/* Generate button */}
      <div style={{padding:"24px var(--pad) 0"}}>
        <button onClick={handleGenerate} style={{width:"100%",padding:18,background:"var(--header-grad)",color:"white",border:"none",borderRadius:18,fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,cursor:"pointer",boxShadow:"0 8px 24px rgba(0,0,0,0.15)"}}>Generate Schedule Preview</button>
        <div style={{fontSize:11,color:"var(--text-soft)",textAlign:"center",marginTop:10,lineHeight:1.5,fontFamily:"'Jost',sans-serif"}}>You'll review all generated dates before confirming.</div>
      </div>
    </div>
  );
}

// ─── GROUP EDIT SCREEN ────────────────────────────────────────────────────────
function OrgEdit({goTo, openTheme, showAlert, theme, initialSection}) {
  const store = useStore();
  const { members, group } = store;
  const [section, setSection] = useState(initialSection || "details"); // details | members | rounds
  const [editingMember, setEditingMember] = useState(null);
  const [showAddMember, setShowAddMember] = useState(initialSection === "members");
  const [newName, setNewName] = useState("");
  const [newPay, setNewPay] = useState(null);
  const [newHands, setNewHands] = useState(1);
  const [confirmRemove, setConfirmRemove] = useState(null);
  const [addRoundCount, setAddRoundCount] = useState(1);

  // Inline edit states for group details
  const [eName, setEName] = useState(group.name);
  const [eAmount, setEAmount] = useState(String(group.handAmount));
  const [eFreq, setEFreq] = useState(group.frequency.toLowerCase());
  const [ePaid, setEPaid] = useState(group.paidThrough);
  const [eOpen, setEOpen] = useState(group.openRound);
  const [detailsDirty, setDetailsDirty] = useState(false);

  const markDirty = () => setDetailsDirty(true);

  const saveDetails = () => {
    const changes = {};
    if (eName !== group.name) changes.name = eName;
    if (Number(eAmount) !== group.handAmount && Number(eAmount) > 0) changes.handAmount = Number(eAmount);
    if (eFreq !== group.frequency.toLowerCase()) changes.frequency = eFreq.charAt(0).toUpperCase() + eFreq.slice(1);
    if (ePaid !== group.paidThrough) changes.paidThrough = ePaid;
    if (eOpen !== group.openRound) changes.openRound = eOpen;
    if (Object.keys(changes).length > 0) {
      updateGroup(changes);
      showAlert("Group details saved ✦");
    }
    setDetailsDirty(false);
  };

  const handleAddMember = () => {
    if (!newName.trim() || !newPay) { showAlert("Fill in name and payment method"); return; }
    addMember({ name: newName.trim(), pay: newPay.charAt(0).toUpperCase() + newPay.slice(1), hands: newHands });
    showAlert(`${newName} added ✦`);
    setNewName(""); setNewPay(null); setNewHands(1); setShowAddMember(false);
  };

  const handleRemoveMember = (id) => {
    const m = members.find(x => x.id === id);
    removeMember(id);
    showAlert(`${m?.name} removed`);
    setConfirmRemove(null);
  };

  const handleAddRounds = () => {
    addRounds(addRoundCount);
    showAlert(`${addRoundCount} round${addRoundCount > 1 ? "s" : ""} added ✦`);
  };

  const TOTAL = getTotalHands();
  const POT = getPotValue();
  const DL = getDateLabels();

  const hdr = (
    <div style={{background:"var(--header-grad)",padding:"54px var(--pad) 32px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",width:220,height:220,borderRadius:"50%",background:"radial-gradient(circle,rgba(201,144,106,0.18) 0%,transparent 70%)",top:-60,right:-60,pointerEvents:"none"}}/>
      <div onClick={()=>goTo("home")} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,fontWeight:500,color:"rgba(255,255,255,0.55)",cursor:"pointer",marginBottom:14,position:"relative"}}>← Back</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,letterSpacing:4,textTransform:"uppercase",color:"var(--gold-light)",marginBottom:6,position:"relative"}}>Pardna</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:600,color:"white",lineHeight:1.1,position:"relative"}}>Edit <em style={{color:"var(--gold-light)"}}>{group.name}</em></div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginTop:5,fontWeight:300,position:"relative"}}>{TOTAL} hands · ${group.handAmount}/hand · {group.frequency}</div>
      <SettingsBtn onClick={openTheme}/>
      <div style={{position:"absolute",bottom:-1,left:0,right:0,height:24,background:"var(--bg)",borderRadius:"24px 24px 0 0"}}/>
    </div>
  );

  // Section tabs
  const tabs = (
    <div style={{display:"flex",gap:6,padding:"var(--pad) var(--pad) 0"}}>
      {[["details","⚙","Details"],["members","👥","Members"],["rounds","📅","Rounds"]].map(([id,icon,label])=>(
        <div key={id} onClick={()=>setSection(id)} style={{flex:1,padding:"12px 8px",borderRadius:14,textAlign:"center",cursor:"pointer",background:section===id?"var(--primary)":"var(--surface)",border:`1.5px solid ${section===id?"var(--primary)":"var(--border)"}`,color:section===id?"white":"var(--text-soft)"}}>
          <div style={{fontSize:16,lineHeight:1}}>{icon}</div>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginTop:4,fontFamily:"'Jost',sans-serif"}}>{label}</div>
        </div>
      ))}
    </div>
  );

  const fieldLabel = (text) => (
    <label style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--text-mid)",marginBottom:8,display:"block",fontFamily:"'Jost',sans-serif"}}>{text}</label>
  );
  const inputStyle = {width:"100%",padding:"13px 15px",border:"1.5px solid var(--border)",borderRadius:13,fontFamily:"'Jost',sans-serif",fontSize:14,color:"var(--text)",background:"var(--bg)",outline:"none"};

  return (
    <div>
      {hdr}
      {tabs}

      {/* ── DETAILS SECTION ── */}
      {section === "details" && (
        <div style={{padding:"0 0 var(--pad)"}}>
          <div style={{background:"var(--surface)",borderRadius:20,padding:22,border:"1px solid var(--border)",margin:"14px var(--pad) 0",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)",borderRadius:"20px 20px 0 0"}}/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"var(--text)",marginBottom:18,marginTop:4}}>Group Settings</div>

            <div style={{marginBottom:16}}>
              {fieldLabel("Group name")}
              <input value={eName} onChange={e=>{setEName(e.target.value);markDirty();}} style={inputStyle}/>
            </div>

            <div style={{marginBottom:16}}>
              {fieldLabel("Amount per hand")}
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:15,top:"50%",transform:"translateY(-50%)",fontSize:16,fontWeight:600,color:"var(--text-mid)",fontFamily:"'Cormorant Garamond',serif"}}>$</span>
                <input type="number" value={eAmount} onChange={e=>{setEAmount(e.target.value);markDirty();}} style={{...inputStyle,paddingLeft:32}}/>
              </div>
            </div>

            <div style={{marginBottom:16}}>
              {fieldLabel("Frequency")}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[["weekly","Weekly"],["bi-weekly","Bi-weekly"],["monthly","Monthly"]].map(([k,l])=>(
                  <div key={k} onClick={()=>{setEFreq(k);markDirty();}} style={{border:`2px solid ${eFreq===k?"var(--primary)":"var(--border)"}`,borderRadius:12,padding:"10px 6px",textAlign:"center",cursor:"pointer",background:eFreq===k?"var(--accent-pale)":"var(--bg)"}}>
                    <div style={{fontSize:12,fontWeight:600,color:eFreq===k?"var(--primary)":"var(--text)",fontFamily:"'Jost',sans-serif"}}>{l}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{marginBottom:16}}>
              {fieldLabel("Current round (paid through)")}
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div onClick={()=>{if(ePaid>0){setEPaid(p=>p-1);markDirty();}}} style={{width:38,height:38,borderRadius:10,border:"1.5px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer",background:"var(--bg)",color:"var(--text)",fontWeight:600,userSelect:"none"}}>−</div>
                <div style={{flex:1,textAlign:"center"}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:700,color:"var(--primary)",lineHeight:1}}>{ePaid + 1}</div>
                  <div style={{fontSize:9,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>of {group.dates.length} rounds paid</div>
                </div>
                <div onClick={()=>{if(ePaid<group.dates.length-1){setEPaid(p=>p+1);markDirty();}}} style={{width:38,height:38,borderRadius:10,border:"1.5px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer",background:"var(--bg)",color:"var(--text)",fontWeight:600,userSelect:"none"}}>+</div>
              </div>
            </div>

            <div style={{marginBottom:16}}>
              {fieldLabel("Open round")}
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div onClick={()=>{if(eOpen>0){setEOpen(p=>p-1);markDirty();}}} style={{width:38,height:38,borderRadius:10,border:"1.5px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer",background:"var(--bg)",color:"var(--text)",fontWeight:600,userSelect:"none"}}>−</div>
                <div style={{flex:1,textAlign:"center"}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:700,color:"var(--gold)",lineHeight:1}}>{eOpen + 1}</div>
                  <div style={{fontSize:9,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>Round {eOpen + 1} · {DL[eOpen] || "—"}</div>
                </div>
                <div onClick={()=>{if(eOpen<group.dates.length-1){setEOpen(p=>p+1);markDirty();}}} style={{width:38,height:38,borderRadius:10,border:"1.5px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,cursor:"pointer",background:"var(--bg)",color:"var(--text)",fontWeight:600,userSelect:"none"}}>+</div>
              </div>
            </div>

            {detailsDirty && (
              <button onClick={saveDetails} style={{width:"100%",padding:16,background:"var(--header-grad)",color:"white",border:"none",borderRadius:16,fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,cursor:"pointer",marginTop:6}}>Save Changes ✦</button>
            )}
          </div>

          {/* Live math preview */}
          <div style={{margin:"14px var(--pad) 0",background:"var(--header-grad)",borderRadius:18,padding:18,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)"}}/>
            <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"rgba(255,255,255,0.5)",marginBottom:10,fontFamily:"'Jost',sans-serif"}}>Live math</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[[TOTAL,"Hands"],["$"+POT.toLocaleString(),"Pot/round"],["$"+(TOTAL*POT).toLocaleString(),"Full cycle"]].map(([v,l],i)=>(
                <div key={i}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:"white",lineHeight:1}}>{v}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.5)",marginTop:3,fontFamily:"'Jost',sans-serif"}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── MEMBERS SECTION ── */}
      {section === "members" && (
        <div style={{padding:"14px var(--pad) var(--pad)"}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"var(--text-soft)",marginBottom:13,fontFamily:"'Jost',sans-serif"}}>
            {TOTAL} member{TOTAL!==1?"s":""} · {group.dates.length} slots
          </div>

          {/* Member list */}
          {[...members].sort((a,b)=>a.pi-b.pi).map(m => {
            const isEditing = editingMember === m.id;
            return (
              <div key={m.id} style={{background:"var(--surface)",borderRadius:16,padding:"14px 16px",border:`1px solid ${isEditing?"var(--primary)":"var(--border)"}`,marginBottom:9,position:"relative",overflow:"hidden"}}>
                {isEditing && <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)"}}/>}
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:38,height:38,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,flexShrink:0,background:"var(--header-grad)",color:"white",fontFamily:"'Cormorant Garamond',serif"}}>{m.pi+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:"var(--text)"}}>{m.name}</div>
                    <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>{m.pay} · {m.hands} hand{m.hands>1?"s":""} · {DL[m.pi]} (Slot {m.pi+1})</div>
                  </div>
                  <div onClick={()=>setEditingMember(isEditing?null:m.id)} style={{width:30,height:30,borderRadius:8,background:"var(--accent-pale)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,cursor:"pointer",color:"var(--primary)",flexShrink:0}}>✎</div>
                </div>

                {isEditing && (
                  <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)"}}>
                    <div style={{marginBottom:12}}>
                      {fieldLabel("Name")}
                      <input defaultValue={m.name} onBlur={e => { if (e.target.value.trim() && e.target.value !== m.name) { updateMember(m.id, {name: e.target.value.trim()}); showAlert("Name updated"); }}} style={inputStyle}/>
                    </div>
                    <div style={{marginBottom:12}}>
                      {fieldLabel("Payment method")}
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                        {[["Zelle","💙"],["Venmo","💜"],["Cash App","💚"]].map(([p,icon])=>(
                          <div key={p} onClick={()=>{updateMember(m.id,{pay:p});showAlert(`Payment updated to ${p}`);}} style={{border:`2px solid ${m.pay===p?"var(--primary)":"var(--border)"}`,borderRadius:10,padding:"8px 4px",textAlign:"center",cursor:"pointer",background:m.pay===p?"var(--accent-pale)":"var(--bg)",fontSize:11,fontWeight:600,color:m.pay===p?"var(--primary)":"var(--text-soft)",fontFamily:"'Jost',sans-serif"}}>{icon} {p}</div>
                        ))}
                      </div>
                    </div>
                    <div style={{marginBottom:12}}>
                      {fieldLabel("Hands")}
                      <div style={{display:"flex",gap:6}}>
                        {[1,2,3,4].map(n=>(
                          <div key={n} onClick={()=>{updateMember(m.id,{hands:n});showAlert(`Hands updated to ${n}`);}} style={{width:44,height:44,borderRadius:10,border:`2px solid ${m.hands===n?"var(--primary)":"var(--border)"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:m.hands===n?"var(--accent-pale)":"var(--bg)",fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:"var(--primary)"}}>{n}</div>
                        ))}
                      </div>
                    </div>
                    <div style={{marginBottom:12}}>
                      {fieldLabel("Move to date")}
                      <div style={{fontSize:10,color:"var(--text-soft)",marginBottom:8,fontFamily:"'Jost',sans-serif",lineHeight:1.5}}>Tap a date to move {m.name} there. If someone already has that slot, they'll swap into {m.name}'s current spot.</div>
                      <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:200,overflowY:"auto",scrollbarWidth:"thin"}}>
                        {getGroup().dates.map((d, di) => {
                          const occupant = members.find(x => x.pi === di);
                          const isCurrent = di === m.pi;
                          const dateLabel = d.replace(/, 20\d{2}/, "");
                          return (
                            <div key={di} onClick={()=>{
                              if (!isCurrent) {
                                const displaced = moveMemberToSlot(m.id, di);
                                showAlert(displaced ? `${m.name} → ${dateLabel} (swapped with ${displaced.name})` : `${m.name} → ${dateLabel}`);
                                setEditingMember(null);
                              }
                            }} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:10,cursor:isCurrent?"default":"pointer",border:`1.5px solid ${isCurrent?"var(--primary)":"var(--border)"}`,background:isCurrent?"var(--accent-pale)":"var(--bg)",opacity:isCurrent?0.7:1}}>
                              <div style={{width:24,height:24,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0,background:isCurrent?"var(--primary)":"var(--bg-mid)",color:isCurrent?"white":"var(--text-soft)",fontFamily:"'Cormorant Garamond',serif"}}>{di+1}</div>
                              <div style={{flex:1}}>
                                <div style={{fontSize:12,fontWeight:500,color:"var(--text)",fontFamily:"'Jost',sans-serif"}}>{dateLabel}</div>
                              </div>
                              <div style={{fontSize:10,color:isCurrent?"var(--primary)":"var(--text-soft)",fontWeight:500,fontFamily:"'Jost',sans-serif"}}>{isCurrent?"Current":occupant?occupant.name:"Open"}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    <button onClick={()=>setConfirmRemove(m.id)} style={{width:"100%",padding:12,borderRadius:12,border:"1.5px solid #E05555",background:"transparent",color:"#E05555",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Jost',sans-serif"}}>Remove {m.name} from group</button>

                    {confirmRemove === m.id && (
                      <div style={{marginTop:10,background:"#FFF0F0",borderRadius:12,padding:14,border:"1px solid #E05555"}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#C03030",marginBottom:8,fontFamily:"'Jost',sans-serif"}}>Are you sure? This will remove {m.name} and reindex all slots.</div>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={()=>handleRemoveMember(m.id)} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"#E05555",color:"white",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Jost',sans-serif"}}>Yes, remove</button>
                          <button onClick={()=>setConfirmRemove(null)} style={{flex:1,padding:10,borderRadius:10,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text-soft)",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'Jost',sans-serif"}}>Cancel</button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}

          {/* Add member */}
          {!showAddMember ? (
            <div onClick={()=>setShowAddMember(true)} style={{background:"var(--surface)",borderRadius:16,padding:"14px 16px",border:"1.5px dashed var(--border)",display:"flex",alignItems:"center",gap:12,cursor:"pointer",marginTop:4}}>
              <div style={{width:38,height:38,borderRadius:10,background:"var(--accent-pale)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,color:"var(--primary)",fontWeight:700}}>+</div>
              <div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:"var(--text)"}}>Add Member</div>
                <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>New member gets the next available slot</div>
              </div>
            </div>
          ) : (
            <div style={{background:"var(--surface)",borderRadius:20,padding:22,border:"1.5px solid var(--primary)",position:"relative",overflow:"hidden",marginTop:4}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)",borderRadius:"20px 20px 0 0"}}/>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:"var(--text)",marginBottom:16,marginTop:4}}>Add New Member</div>
              <div style={{marginBottom:12}}>
                {fieldLabel("Name")}
                <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="e.g. Aunya" style={inputStyle}/>
              </div>
              <div style={{marginBottom:12}}>
                {fieldLabel("Payment method")}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                  {[["zelle","💙","Zelle"],["venmo","💜","Venmo"],["cashapp","💚","Cash App"]].map(([k,icon,label])=>(
                    <div key={k} onClick={()=>setNewPay(k)} style={{border:`2px solid ${newPay===k?"var(--primary)":"var(--border)"}`,borderRadius:10,padding:"10px 4px",textAlign:"center",cursor:"pointer",background:newPay===k?"var(--accent-pale)":"var(--bg)",fontSize:11,fontWeight:600,color:newPay===k?"var(--primary)":"var(--text-soft)",fontFamily:"'Jost',sans-serif"}}>{icon} {label}</div>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:16}}>
                {fieldLabel("Hands")}
                <div style={{display:"flex",gap:6}}>
                  {[1,2,3,4].map(n=>(
                    <div key={n} onClick={()=>setNewHands(n)} style={{width:44,height:44,borderRadius:10,border:`2px solid ${newHands===n?"var(--primary)":"var(--border)"}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:newHands===n?"var(--accent-pale)":"var(--bg)",fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:"var(--primary)"}}>{n}</div>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={handleAddMember} style={{flex:1,padding:14,borderRadius:14,border:"none",background:"var(--header-grad)",color:"white",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"'Cormorant Garamond',serif"}}>Add to Group ✦</button>
                <button onClick={()=>{setShowAddMember(false);setNewName("");setNewPay(null);setNewHands(1);}} style={{padding:"14px 18px",borderRadius:14,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text-soft)",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"'Jost',sans-serif"}}>Cancel</button>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── ROUNDS SECTION ── */}
      {section === "rounds" && (
        <div style={{padding:"14px var(--pad) var(--pad)"}}>
          {/* Current cycle info */}
          <div style={{background:"var(--surface)",borderRadius:20,padding:20,border:"1px solid var(--border)",marginBottom:14}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"var(--text)",marginBottom:14}}>Current Cycle</div>
            {[["Total rounds", group.dates.length],["Start date", group.dates[0]],["End date", group.dates[group.dates.length-1]],["Frequency", group.frequency],["Rounds completed", group.paidThrough + 1],["Remaining", group.dates.length - group.paidThrough - 1]].map(([k,v],i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:i<5?"1px solid var(--border)":"none"}}>
                <span style={{fontSize:12,color:"var(--text-soft)",fontFamily:"'Jost',sans-serif"}}>{k}</span>
                <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:"var(--text)"}}>{v}</span>
              </div>
            ))}
          </div>

          {/* Add rounds */}
          <div style={{background:"var(--surface)",borderRadius:20,padding:22,border:"1px solid var(--border)",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)",borderRadius:"20px 20px 0 0"}}/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"var(--text)",marginBottom:4,marginTop:4}}>Extend the Cycle</div>
            <div style={{fontSize:11,color:"var(--text-soft)",marginBottom:18,lineHeight:1.6,fontFamily:"'Jost',sans-serif"}}>Add more rounds if new members join or someone wants additional hands. New dates continue from where the current cycle ends.</div>

            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
              <div onClick={()=>addRoundCount>1&&setAddRoundCount(n=>n-1)} style={{width:44,height:44,borderRadius:12,border:"1.5px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",background:"var(--bg)",color:"var(--text)",fontWeight:600,userSelect:"none"}}>−</div>
              <div style={{flex:1,textAlign:"center"}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:700,color:"var(--primary)",lineHeight:1}}>{addRoundCount}</div>
                <div style={{fontSize:10,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>round{addRoundCount>1?"s":""} to add</div>
              </div>
              <div onClick={()=>addRoundCount<20&&setAddRoundCount(n=>n+1)} style={{width:44,height:44,borderRadius:12,border:"1.5px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,cursor:"pointer",background:"var(--bg)",color:"var(--text)",fontWeight:600,userSelect:"none"}}>+</div>
            </div>

            <div style={{background:"var(--bg)",borderRadius:12,padding:"12px 14px",border:"1px solid var(--border)",marginBottom:16}}>
              <div style={{fontSize:11,color:"var(--text-soft)",fontFamily:"'Jost',sans-serif",lineHeight:1.6}}>
                Adding {addRoundCount} round{addRoundCount>1?"s":""} will extend the cycle to <strong style={{color:"var(--primary)"}}>{group.dates.length + addRoundCount} total rounds</strong>, ending around <strong style={{color:"var(--primary)"}}>{generateCycleDates(group.dates[group.dates.length-1], group.frequency.toLowerCase(), addRoundCount+1).pop()}</strong>.
              </div>
            </div>

            <button onClick={handleAddRounds} style={{width:"100%",padding:16,background:"var(--header-grad)",color:"white",border:"none",borderRadius:16,fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,cursor:"pointer"}}>Add {addRoundCount} Round{addRoundCount>1?"s":""} ✦</button>
          </div>

          {/* All dates list */}
          <div style={{marginTop:18}}>
            <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"var(--text-soft)",marginBottom:13,fontFamily:"'Jost',sans-serif"}}>All {group.dates.length} Dates</div>
            <div className="resp-grid">
            {group.dates.map((d, i) => {
              const member = members.find(m => m.pi === i);
              const isPast = i <= group.paidThrough;
              const isCurrent = i === group.openRound;
              return (
                <div key={i} style={{background:"var(--surface)",borderRadius:12,padding:"10px 14px",border:`1px solid ${isCurrent?"var(--gold)":"var(--border)"}`,marginBottom:6,display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,background:isPast?"var(--green-bg)":isCurrent?"var(--header-grad)":"var(--bg-mid)",color:isPast?"var(--green)":isCurrent?"white":"var(--text-soft)",fontFamily:"'Cormorant Garamond',serif"}}>{isPast?"✓":i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:500,color:"var(--text)",fontFamily:"'Jost',sans-serif"}}>{d}</div>
                    <div style={{fontSize:10,color:"var(--text-soft)",fontFamily:"'Jost',sans-serif"}}>{member ? member.name : "Open slot"}{isCurrent?" · Current":""}</div>
                  </div>
                </div>
              );
            })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SCHEDULE DRAFT SCREEN ────────────────────────────────────────────────────
function OrgGenerate({submissions, goTo, openTheme, showAlert, theme}) {
  const approved = submissions.filter(s => s.status === "approved");
  const [result, setResult] = useState(null);
  const [applied, setApplied] = useState(false);
  const g = getGroup();
  const DL = getDateLabels();

  useEffect(() => {
    if (approved.length > 0 && !result) {
      setResult(generateSchedule(approved));
    }
  }, [approved.length]);

  const methodLabel = m => {
    if (m === "organizer") return "Organizer (always Slot 1)";
    if (m === "1st choice") return "Got their 1st choice ✦";
    if (m === "2nd choice") return "1st taken → got 2nd choice";
    if (m === "closest available") return "Both picks taken → closest open date";
    return m;
  };

  const methodColor = m => {
    if (m === "organizer") return "var(--gold)";
    if (m === "1st choice") return "var(--green)";
    if (m === "2nd choice") return "var(--accent)";
    return "var(--text-soft)";
  };

  const [selectedIdx, setSelectedIdx] = useState(null);

  const handleSlotTap = (i) => {
    const a = result.assignments[i];
    if (a.method === "organizer") return; // Slot 1 is locked
    if (selectedIdx === null) {
      setSelectedIdx(i);
    } else if (selectedIdx === i) {
      setSelectedIdx(null); // deselect
    } else {
      // Swap the slotIndex between the two assignments
      const newAssignments = result.assignments.map((x, idx) => {
        if (idx === selectedIdx) return { ...x, slotIndex: result.assignments[i].slotIndex };
        if (idx === i) return { ...x, slotIndex: result.assignments[selectedIdx].slotIndex };
        return x;
      });
      newAssignments.sort((a, b) => a.slotIndex - b.slotIndex);
      setResult({ ...result, assignments: newAssignments });
      setSelectedIdx(null);
      showAlert("Slots swapped ✦");
    }
  };

  const handleApply = async () => {
    await applySchedule(result);
    setApplied(true);
    showAlert("Schedule applied ✦ Members are set!");
  };

  return (
    <div>
      <div style={{background:"var(--header-grad)",padding:"54px var(--pad) 36px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",width:220,height:220,borderRadius:"50%",background:"radial-gradient(circle,rgba(201,144,106,0.18) 0%,transparent 70%)",top:-60,right:-60,pointerEvents:"none"}}/>
        <div onClick={()=>goTo("inbox")} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,fontWeight:500,color:"rgba(255,255,255,0.55)",cursor:"pointer",marginBottom:14,position:"relative"}}>← Back to Inbox</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,letterSpacing:4,textTransform:"uppercase",color:"var(--gold-light)",marginBottom:6,position:"relative"}}>Pardna</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:600,color:"white",lineHeight:1.1,position:"relative"}}>Draft <em style={{color:"var(--gold-light)"}}>Schedule</em></div>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginTop:5,fontWeight:300,position:"relative",lineHeight:1.5}}>Review how slots were assigned. Apply when you're satisfied, or go back and adjust submissions.</div>
        <SettingsBtn onClick={openTheme}/>
        <div style={{position:"absolute",bottom:-1,left:0,right:0,height:24,background:"var(--bg)",borderRadius:"24px 24px 0 0"}}/>
      </div>

      {!result ? (
        <div style={{padding:"40px var(--pad)",textAlign:"center",color:"var(--text-soft)",fontSize:13}}>No approved submissions to generate from.</div>
      ) : applied ? (
        <div style={{padding:"var(--pad)"}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",padding:"30px 0"}}>
            <div style={{width:80,height:80,borderRadius:"50%",background:"var(--green-bg)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,marginBottom:20}}>✓</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:600,color:"var(--text)",marginBottom:8}}>Schedule <em style={{color:"var(--gold)"}}>Applied</em></div>
            <div style={{fontSize:13,color:"var(--text-soft)",lineHeight:1.6,marginBottom:24,fontFamily:"'Jost',sans-serif"}}>All {result.assignments.length} slots have been assigned. Your tracker, schedule view, and member views are updated.</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>goTo("grid")} style={{padding:"14px 24px",background:"var(--header-grad)",color:"white",border:"none",borderRadius:14,fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,cursor:"pointer"}}>View Tracker</button>
              <button onClick={()=>goTo("schedule")} style={{padding:"14px 24px",background:"var(--surface)",color:"var(--primary)",border:"1.5px solid var(--border)",borderRadius:14,fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,cursor:"pointer"}}>View Schedule</button>
            </div>
          </div>
        </div>
      ) : (
        <div>
          {/* Stats summary */}
          <div style={{margin:"var(--pad) var(--pad) 0",background:"var(--surface)",borderRadius:20,padding:20,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",border:"1px solid var(--border)"}}>
            {[[result.assignments.length,"Slots filled"],[g.dates.length - result.assignments.length,"Open slots"],[result.unassigned.length,"Unassigned"]].map(([v,l],i)=>(
              <div key={i} style={i>0?{borderLeft:"1px solid var(--border)",paddingLeft:16}:{}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:i===2&&v>0?"#E05555":"var(--primary)",lineHeight:1}}>{v}</div>
                <div style={{fontSize:10,color:"var(--text-soft)",marginTop:3}}>{l}</div>
              </div>
            ))}
          </div>

          {/* Method breakdown */}
          <div style={{margin:"14px var(--pad) 0",background:"var(--surface)",borderRadius:16,padding:"14px 16px",border:"1px solid var(--border)"}}>
            <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"var(--text-soft)",marginBottom:10,fontFamily:"'Jost',sans-serif"}}>How slots were assigned</div>
            {["organizer","1st choice","2nd choice","closest available"].map(m => {
              const count = result.assignments.filter(a => a.method === m).length;
              if (count === 0) return null;
              return (
                <div key={m} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:methodColor(m),flexShrink:0}}/>
                  <div style={{fontSize:12,color:"var(--text)",fontFamily:"'Jost',sans-serif",flex:1}}>{methodLabel(m)}</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:"var(--primary)"}}>{count}</div>
                </div>
              );
            })}
          </div>

          {/* Assignment list */}
          <div style={{padding:"var(--pad) var(--pad) 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
              <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"var(--text-soft)",fontFamily:"'Jost',sans-serif"}}>Slot Assignments</div>
              {selectedIdx !== null
                ? <div style={{fontSize:10,fontWeight:600,color:"var(--primary)",fontFamily:"'Jost',sans-serif",background:"var(--accent-pale)",padding:"3px 10px",borderRadius:20,border:"1px solid var(--border)"}}>Now tap a slot to swap ↕</div>
                : <div style={{fontSize:10,color:"var(--text-soft)",fontFamily:"'Jost',sans-serif"}}>Tap any slot to reorder</div>
              }
            </div>
            <div className="resp-grid">
            {result.assignments.map((a, i) => {
              const isSelected = selectedIdx === i;
              const isLocked = a.method === "organizer";
              const isSwapTarget = selectedIdx !== null && !isSelected && !isLocked;
              return (
              <div key={i} onClick={()=>handleSlotTap(i)}
                style={{background:isSelected?"var(--accent-pale)":isSwapTarget?"var(--bg-mid)":"var(--surface)",borderRadius:16,padding:"14px 16px",
                  border:isSelected?"2px solid var(--primary)":isSwapTarget?"1.5px dashed var(--accent)":"1px solid var(--border)",
                  marginBottom:9,position:"relative",overflow:"hidden",cursor:isLocked?"default":"pointer",
                  transition:"border 0.15s,background 0.15s"}}>
                <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:isLocked?"var(--shimmer)":isSelected?"var(--primary)":"transparent",borderRadius:"16px 16px 0 0"}}/>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:40,height:40,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:700,flexShrink:0,
                    background:isLocked?"var(--header-grad)":isSelected?"var(--primary)":"var(--bg-mid)",
                    color:isLocked||isSelected?"white":"var(--text-soft)",fontFamily:"'Cormorant Garamond',serif"}}>{a.slotIndex+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:"var(--text)"}}>{a.name}</div>
                    <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>{DL[a.slotIndex]} · {a.pay}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    {isLocked
                      ? <div style={{fontSize:10,fontWeight:600,color:"var(--gold)",fontFamily:"'Jost',sans-serif"}}>🔒 Organizer</div>
                      : isSelected
                        ? <div style={{fontSize:11,fontWeight:700,color:"var(--primary)",fontFamily:"'Jost',sans-serif"}}>Selected ✦</div>
                        : <div style={{fontSize:10,fontWeight:600,color:methodColor(a.method),fontFamily:"'Jost',sans-serif"}}>{a.method}</div>
                    }
                  </div>
                </div>
                {a.method !== "organizer" && (
                  <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${isSelected?"var(--border)":"var(--border)"}`,fontSize:10,color:"var(--text-soft)",lineHeight:1.6,fontFamily:"'Jost',sans-serif"}}>
                    Wanted: <strong style={{color:"var(--text-mid)"}}>{a.prefFirst ? a.prefFirst.replace(/, 20\d{2}/,"") : "—"}</strong> (1st)
                    {a.prefSecond && <> · <strong style={{color:"var(--text-mid)"}}>{a.prefSecond.replace(/, 20\d{2}/,"")}</strong> (2nd)</>}
                    {a.method !== "1st choice" && <> → <span style={{color:methodColor(a.method)}}>{a.method === "2nd choice" ? "got 2nd" : "nearest open"}</span></>}
                  </div>
                )}
              </div>
              );
            })}
            </div>
          </div>

          {/* Unassigned warning */}
          {result.unassigned.length > 0 && (
            <div style={{margin:"14px var(--pad) 0",background:"#FFF0F0",borderRadius:16,padding:"14px 16px",border:"1px solid #E05555"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#C03030",marginBottom:6,fontFamily:"'Jost',sans-serif"}}>⚠ {result.unassigned.length} hand{result.unassigned.length>1?"s":""} couldn't be assigned</div>
              <div style={{fontSize:11,color:"#C03030",lineHeight:1.5,fontFamily:"'Jost',sans-serif"}}>There aren't enough open slots. You can add rounds in the Edit screen, or remove submissions and regenerate.</div>
            </div>
          )}

          {/* Apply / back buttons */}
          <div style={{padding:"24px var(--pad) 0"}}>
            <button onClick={handleApply} style={{width:"100%",padding:18,background:"var(--header-grad)",color:"white",border:"none",borderRadius:18,fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,cursor:"pointer",boxShadow:"0 8px 24px rgba(0,0,0,0.15)"}}>Apply This Schedule ✦</button>
            <div style={{fontSize:11,color:"var(--text-soft)",textAlign:"center",marginTop:10,lineHeight:1.5,fontFamily:"'Jost',sans-serif"}}>This will replace your current member list with the generated assignments. You can still edit individual slots afterward.</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
function OnboardingApp({theme, changeTheme, showAlert, goToMyView, groupId}) {
  const [showTheme, setShowTheme] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [sub, setSub]             = useState(null);
  const [nickname,  setNickname]  = useState("");
  const [payMethod, setPayMethod] = useState(null);
  const [hands, setHands]         = useState(1);
  const [prefs, setPrefs]         = useState([{first:null,second:null}]);
  const [errors, setErrors]       = useState({});

  // Resolve the group this onboarding form is for
  const tg = (groupId && getGroups().find(g => g.id === groupId)) || getGroup();

  const changeHands = n => {
    setHands(n);
    setPrefs(prev=>{const next=[...prev];while(next.length<n)next.push({first:null,second:null});return next.slice(0,n);});
  };
  const setPref = (hi,choice,date) => {
    setPrefs(prev=>{
      const next=[...prev]; const h={...next[hi]};
      if(choice==="first"){if(h.second===date)h.second=null;h.first=h.first===date?null:date;}
      else{if(h.first===date)h.first=null;h.second=h.second===date?null:date;}
      next[hi]=h; return next;
    });
  };
  const validate = () => {
    const e={};
    if(!nickname.trim())e.nickname="Please enter your name";
    if(!payMethod)e.payMethod="Choose a payment method";
    prefs.forEach((p,i)=>{if(!p.first)e[`pf${i}`]="Choose a 1st preference";if(!p.second)e[`ps${i}`]="Choose a 2nd preference";});
    setErrors(e); return Object.keys(e).length===0;
  };
  const handleSubmit = () => {
    if(!validate()){showAlert("Please complete all fields");return;}
    const result = submitOnboarding({nickname,payMethod,hands,prefs}, groupId);
    setSub(result); setSubmitted(true);
  };
  const pm = {zelle:"💙 Zelle",venmo:"💜 Venmo",cashapp:"💚 Cash App"}[payMethod];

  const hdr = (title,sub) => (
    <div style={{background:"var(--header-grad)",padding:"54px var(--pad) 36px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",width:220,height:220,borderRadius:"50%",background:"radial-gradient(circle,rgba(201,144,106,0.18) 0%,transparent 70%)",top:-60,right:-60}}/>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:11,letterSpacing:4,textTransform:"uppercase",color:"var(--gold-light)",marginBottom:8,position:"relative"}}>Pardna</div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:600,color:"white",lineHeight:1.1,position:"relative"}}>{title}</div>
      <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:6,position:"relative",fontWeight:300,lineHeight:1.5}}>{sub}</div>
      <SettingsBtn onClick={()=>setShowTheme(true)}/>
      <div style={{position:"absolute",bottom:-1,left:0,right:0,height:28,background:"var(--bg)",borderRadius:"28px 28px 0 0"}}/>
    </div>
  );

  const card = (title, sub, children) => (
    <div style={{background:"var(--surface)",borderRadius:20,padding:22,border:"1px solid var(--border)",margin:"14px var(--pad) 0",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)",borderRadius:"20px 20px 0 0"}}/>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,color:"var(--text)",marginBottom:4,marginTop:4}}>{title}</div>
      <div style={{fontSize:11,color:"var(--text-soft)",marginBottom:18,lineHeight:1.6,fontFamily:"'Jost',sans-serif"}}>{sub}</div>
      {children}
    </div>
  );

  if (submitted && sub) return (
    <div>
      {showTheme && <ThemeModal current={theme} onSelect={k=>{changeTheme(k);setShowTheme(false);}} onClose={()=>setShowTheme(false)}/>}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 28px",textAlign:"center",minHeight:"70vh"}}>
        <div style={{width:90,height:90,borderRadius:"50%",background:"var(--header-grad)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,marginBottom:24,boxShadow:"0 12px 40px rgba(0,0,0,0.18)"}}>🌸</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:600,color:"var(--text)",lineHeight:1.1,marginBottom:10}}>You're <em style={{color:"var(--gold)"}}>in</em>,<br/>{nickname}!</div>
        <div style={{fontSize:13,color:"var(--text-soft)",lineHeight:1.7,marginBottom:32}}>Your preferences have been sent to your organizer. Once everyone submits, you'll receive your personal Pardna link.</div>
        <div style={{background:"var(--surface)",borderRadius:20,padding:20,border:"1px solid var(--border)",width:"100%",marginBottom:24,textAlign:"left"}}>
          {[["Group",tg.name],["Hands",`${hands} hand${hands>1?"s":""}`],["Per round","$"+hands*tg.handAmount],["Pay via",pm||"—"],["Payout","$"+hands*getPotValue()],...prefs.flatMap((p,hi)=>[[hands>1?`H${hi+1} 1st`:"1st pick",p.first?.replace(", 2025","").replace(", 2026","")],[hands>1?`H${hi+1} 2nd`:"2nd pick",p.second?.replace(", 2025","").replace(", 2026","")]])].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
              <span style={{fontSize:11,color:"var(--text-soft)",fontFamily:"'Jost',sans-serif"}}>{k}</span>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:"var(--text)"}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{fontSize:12,color:"var(--text-soft)",lineHeight:1.6,marginBottom:24}}>Your organizer will review your submission and reach out once the schedule is ready.</div>
        <div onClick={goToMyView} style={{background:"var(--header-grad)",borderRadius:14,padding:"13px 28px",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,boxShadow:"0 4px 16px rgba(0,0,0,0.15)"}}>
          <span style={{fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:"white",letterSpacing:"0.04em"}}>Back to My View</span>
          <span style={{color:"var(--gold-light)"}}>→</span>
        </div>
      </div>
    </div>
  );

  return (
    <div>
      {showTheme && <ThemeModal current={theme} onSelect={k=>{changeTheme(k);setShowTheme(false);}} onClose={()=>setShowTheme(false)}/>}
      {hdr(<>Join the <em style={{color:"var(--gold-light)"}}>Circle</em></>, <>You've been invited to {tg.name}.<br/>Fill this out so your organizer can build your schedule.</>)}
      <div onClick={goToMyView} style={{display:"inline-flex",alignItems:"center",gap:6,margin:"16px var(--pad) 0",fontSize:12,fontWeight:500,color:"var(--text-soft)",cursor:"pointer",fontFamily:"'Jost',sans-serif"}}>← Back to My View</div>

      {/* Group banner */}
      <div style={{margin:"var(--pad) var(--pad) 0",background:"var(--surface)",borderRadius:20,padding:18,border:"1px solid var(--border)",display:"flex",gap:14,alignItems:"center"}}>
        <div style={{width:46,height:46,borderRadius:"50%",background:"var(--header-grad)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:"white",flexShrink:0}}>{tg.organizer}</div>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,color:"var(--text)"}}>{tg.name}</div>
          <div style={{fontSize:11,color:"var(--text-soft)",marginTop:3,lineHeight:1.6,fontFamily:"'Jost',sans-serif"}}>${tg.handAmount}/hand · {tg.frequency}<br/>{tg.startDate} – {tg.endDate}</div>
          <div style={{display:"inline-flex",alignItems:"center",gap:5,background:"var(--accent-pale)",border:"1px solid var(--border)",borderRadius:20,padding:"3px 10px",fontSize:10,fontWeight:600,color:"var(--primary)",marginTop:6}}>🌹 {getTotalHands()} hands total</div>
        </div>
      </div>

      {/* Name */}
      {card("What should we call you?","This is how your name will appear in the group.",
        <>
          <label style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--text-mid)",marginBottom:8,display:"block",fontFamily:"'Jost',sans-serif"}}>Preferred name</label>
          <input className={errors.nickname?"err":""} value={nickname} onChange={e=>{setNickname(e.target.value);setErrors(p=>({...p,nickname:null}));}} placeholder="e.g. Aunya" style={{width:"100%",padding:"13px 15px",border:`1.5px solid ${errors.nickname?"#E05555":"var(--border)"}`,borderRadius:13,fontFamily:"'Jost',sans-serif",fontSize:14,color:"var(--text)",background:"var(--bg)",outline:"none",marginBottom:errors.nickname?0:4}}/>
          {errors.nickname&&<div style={{fontSize:10,color:"#E05555",fontWeight:600,marginTop:4,fontFamily:"'Jost',sans-serif"}}>⚠ {errors.nickname}</div>}
        </>
      )}

      {/* Payment */}
      {card("How will you send payments?","Your organizer will send you a request each round via this method.",
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:4}}>
            {[["zelle","💙","Zelle"],["venmo","💜","Venmo"],["cashapp","💚","Cash App"]].map(([k,icon,label])=>(
              <div key={k} onClick={()=>{setPayMethod(k);setErrors(p=>({...p,payMethod:null}));}} style={{border:`2px solid ${payMethod===k?"var(--primary)":"var(--border)"}`,borderRadius:14,padding:"14px 8px",textAlign:"center",cursor:"pointer",background:payMethod===k?"var(--accent-pale)":"var(--bg)"}}>
                <div style={{fontSize:24,marginBottom:5}}>{icon}</div>
                <div style={{fontSize:12,fontWeight:600,color:payMethod===k?"var(--primary)":"var(--text)",fontFamily:"'Jost',sans-serif"}}>{label}</div>
              </div>
            ))}
          </div>
          {errors.payMethod&&<div style={{fontSize:10,color:"#E05555",fontWeight:600,marginTop:8,fontFamily:"'Jost',sans-serif"}}>⚠ {errors.payMethod}</div>}
        </>
      )}

      {/* Hands */}
      {card("How many hands?",`Each hand costs $${getGroup().handAmount}/round and earns you one $${getPotValue().toLocaleString()} payout.`,
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
          {[1,2,3,4].map(n=>(
            <div key={n} onClick={()=>changeHands(n)} style={{border:`2px solid ${hands===n?"var(--primary)":"var(--border)"}`,borderRadius:13,padding:"12px 6px",textAlign:"center",cursor:"pointer",background:hands===n?"var(--accent-pale)":"var(--bg)"}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:"var(--primary)",lineHeight:1}}>{n}</div>
              <div style={{fontSize:9,color:"var(--text-soft)",marginTop:3,fontWeight:600,textTransform:"uppercase",fontFamily:"'Jost',sans-serif"}}>{n===1?"hand":"hands"}</div>
              <div style={{fontSize:9,color:"var(--accent)",marginTop:3,fontWeight:600,fontFamily:"'Jost',sans-serif"}}>${getGroup().handAmount*n}/rnd</div>
            </div>
          ))}
        </div>
      )}

      {/* Date prefs */}
      {card("Payout preferences","Pick 2 preferred dates per hand. Your organizer will match your first choice where possible, then second, then closest available.",
        prefs.map((pref,hi)=>(
          <div key={hi} style={{background:"var(--bg)",borderRadius:15,padding:16,marginBottom:12,border:"1px solid var(--border)"}}>
