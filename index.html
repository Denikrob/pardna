            {[["first","1st choice",`pf${hi}`],["second","2nd choice",`ps${hi}`]].map(([choice,clabel,ekey])=>(
              <div key={choice} style={{marginBottom:choice==="second"?0:12}}>
                <span style={{fontSize:10,fontWeight:600,color:"var(--text-soft)",marginBottom:6,display:"block",fontFamily:"'Jost',sans-serif"}}>{clabel}</span>
                <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,scrollbarWidth:"none"}}>
                  {getGroup().dates.map(d=>{
                    const label=d.replace(", 2025","").replace(", 2026","");
                    const isSelected = pref[choice]===d;
                    const isDisabled = (choice==="first"?pref.second:pref.first)===d;
                    return (
                      <div key={d} onClick={()=>{if(!isDisabled){setPref(hi,choice,d);setErrors(p=>({...p,[ekey]:null}));}}} style={{flexShrink:0,padding:"7px 13px",borderRadius:20,fontSize:11,fontWeight:600,cursor:isDisabled?"default":"pointer",border:`1.5px solid ${isSelected?"var(--primary)":"var(--border)"}`,background:isSelected?"var(--primary)":"var(--surface)",color:isSelected?"white":"var(--text-soft)",opacity:isDisabled?0.32:1,whiteSpace:"nowrap",fontFamily:"'Jost',sans-serif"}}>
                        {label}
                      </div>
                    );
                  })}
                </div>
                {errors[ekey]&&<div style={{fontSize:10,color:"#E05555",fontWeight:600,marginTop:6,fontFamily:"'Jost',sans-serif"}}>⚠ {errors[ekey]}</div>}
              </div>
            ))}
          </div>
        ))
      )}

      {/* Summary */}
      {nickname&&payMethod&&(
        <div style={{background:"var(--header-grad)",borderRadius:20,margin:"14px var(--pad) 0",padding:22,position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)"}}/>
          <div style={{position:"absolute",width:150,height:150,borderRadius:"50%",background:"radial-gradient(circle,rgba(255,255,255,0.07) 0%,transparent 70%)",top:-40,right:-40,pointerEvents:"none"}}/>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"rgba(255,255,255,0.5)",marginBottom:14,fontFamily:"'Jost',sans-serif"}}>Your summary</div>
          {[["Name",nickname],["Group",tg.name],["Hands",`${hands} hand${hands>1?"s":""}`],["Per round","$"+hands*tg.handAmount],["Pay via",pm||"—"],["Payout","$"+hands*getPotValue()]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
              <span style={{fontSize:12,color:"rgba(255,255,255,0.55)",fontFamily:"'Jost',sans-serif"}}>{k}</span>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600,color:k==="Payout"?"var(--gold-light)":"white"}}>{v}</span>
            </div>
          ))}
        </div>
      )}

      <div style={{padding:"var(--pad) var(--pad) 0"}}>
        <button onClick={handleSubmit} style={{width:"100%",padding:18,background:"var(--header-grad)",color:"white",border:"none",borderRadius:18,fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:600,cursor:"pointer"}}>Submit &amp; Join the Circle</button>
        <div style={{fontSize:11,color:"var(--text-soft)",textAlign:"center",marginTop:10,lineHeight:1.5,fontFamily:"'Jost',sans-serif"}}>Your preferences will be sent to your organizer.<br/>They'll finalize the schedule and share your personal link.</div>
      </div>
    </div>
  );
}

// ─── MEMBER VIEW ──────────────────────────────────────────────────────────────
function MemberApp({theme, changeTheme, showAlert, goToOnboard, memberId, setMemberId}) {
  const store = useStore();
  const { members } = store;
  const [showTheme, setShowTheme] = useState(false);
  const [showMsg, setShowMsg] = useState(false);
  const [msgName, setMsgName] = useState("");
  const [msgText, setMsgText] = useState("");
  const [nameInput, setNameInput] = useState("");
  const [nameError, setNameError] = useState("");
  const PAID_THROUGH = getGroup().paidThrough;
  const OPEN_ROUND   = getGroup().openRound;
  const member       = members.find(m=>m.id===memberId) || null;

  // Name-entry screen — shown when no member is identified yet
  if (!member) {
    const handleIdentify = () => {
      const input = nameInput.trim().toLowerCase();
      if (!input) { setNameError("Please enter your name."); return; }
      const matches = members.filter(m => m.name.replace(/\s*\(.*\)/,"").toLowerCase() === input || m.name.toLowerCase() === input);
      if (matches.length === 1) { setMemberId(matches[0].id); setNameError(""); }
      else if (matches.length > 1) setNameError("Multiple members share this name. Please use your personal link sent by your organizer.");
      else setNameError("Name not found. Check spelling or contact your organizer.");
    };
    return (
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 28px",textAlign:"center"}}>
        <div style={{width:72,height:72,borderRadius:"50%",background:"var(--header-grad)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,marginBottom:24,boxShadow:"0 8px 32px rgba(0,0,0,0.15)"}}>✦</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:32,fontWeight:600,color:"var(--text)",marginBottom:8}}>Welcome to<br/><em style={{color:"var(--gold)"}}>{getGroup().name}</em></div>
        <div style={{fontSize:13,color:"var(--text-soft)",lineHeight:1.7,marginBottom:32,fontFamily:"'Jost',sans-serif"}}>Enter your name to access your personal view.</div>
        <div style={{width:"100%",maxWidth:320}}>
          <input value={nameInput} onChange={e=>{setNameInput(e.target.value);setNameError("");}} onKeyDown={e=>e.key==="Enter"&&handleIdentify()} placeholder="Your name" style={{width:"100%",background:"var(--surface)",border:`1px solid ${nameError?"var(--accent)":"var(--border)"}`,borderRadius:12,padding:"13px 16px",fontSize:15,color:"var(--text)",fontFamily:"'Jost',sans-serif",outline:"none",marginBottom:10,textAlign:"center"}}/>
          {nameError && <div style={{fontSize:11,color:"var(--accent)",marginBottom:10,fontFamily:"'Jost',sans-serif"}}>{nameError}</div>}
          <button onClick={handleIdentify} style={{width:"100%",background:"var(--header-grad)",border:"none",borderRadius:12,padding:"13px",fontFamily:"'Jost',sans-serif",fontSize:13,fontWeight:600,color:"white",cursor:"pointer",letterSpacing:"0.04em"}}>Access My View →</button>
          <div onClick={goToOnboard} style={{marginTop:20,fontSize:11,color:"var(--text-soft)",cursor:"pointer",fontFamily:"'Jost',sans-serif"}}>New to the circle? <span style={{color:"var(--primary)",fontWeight:600}}>Submit your preferences</span></div>
        </div>
      </div>
    );
  }
  const firstName    = member.name.replace(/\s*\(.*\)/,"").split(" ")[0];
  const payoutDate   = getDateLabels()[member.pi];
  const payoutDone   = member.pi<=PAID_THROUGH;
  const isPayoutNow  = member.pi===OPEN_ROUND;
  const openPaid     = isPaid(member.id, OPEN_ROUND);
  const payoutIcon   = theme==="rosegold"?"🌸":"💰";

  return (
    <div style={{paddingBottom:20}}>
      {showTheme && <ThemeModal current={theme} onSelect={k=>{changeTheme(k);setShowTheme(false);}} onClose={()=>setShowTheme(false)}/>}

      {/* Hero */}
      <div style={{background:"var(--header-grad)",padding:"54px var(--pad) 40px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",width:240,height:240,borderRadius:"50%",background:"radial-gradient(circle,rgba(201,144,106,0.2) 0%,transparent 70%)",top:-80,right:-80,pointerEvents:"none"}}/>
        <div style={{position:"absolute",width:160,height:160,borderRadius:"50%",background:"radial-gradient(circle,rgba(196,120,138,0.14) 0%,transparent 70%)",bottom:0,left:-50,pointerEvents:"none"}}/>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:10,letterSpacing:4,textTransform:"uppercase",color:"var(--gold-light)",marginBottom:20,position:"relative"}}>Pardna</div>
        <div style={{width:64,height:64,borderRadius:"50%",background:"linear-gradient(135deg,var(--accent),var(--gold))",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:"white",border:"3px solid rgba(255,255,255,0.25)",marginBottom:14,position:"relative"}}>{avatarLetters(member.name)}</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,color:"rgba(255,255,255,0.5)",position:"relative",marginBottom:4}}>Welcome back,</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:600,color:"white",lineHeight:1.05,position:"relative"}}>{firstName} <em style={{color:"var(--gold-light)"}}>✦</em></div>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:20,padding:"5px 13px",fontSize:11,color:"rgba(255,255,255,0.65)",marginTop:10,position:"relative",fontWeight:500,fontFamily:"'Jost',sans-serif"}}>
          {theme==="rosegold"?"🌹":"✦"} {getGroup().name} · ${getGroup().handAmount}/hand · Slot {member.pi+1} of {getTotalHands()}
        </div>
        <SettingsBtn onClick={()=>setShowTheme(true)}/>
        <div style={{position:"absolute",bottom:-1,left:0,right:0,height:28,background:"var(--bg)",borderRadius:"28px 28px 0 0"}}/>
      </div>

      {/* Payout hero */}
      <div style={{margin:"24px var(--pad) 0",background:"var(--header-grad)",borderRadius:24,padding:24,position:"relative",overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:3,borderRadius:"24px 24px 0 0",background:"var(--shimmer)"}}/>
        <div style={{position:"absolute",width:160,height:160,borderRadius:"50%",background:"radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 70%)",top:-40,right:-40,pointerEvents:"none"}}/>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"rgba(255,255,255,0.5)",marginBottom:8,fontFamily:"'Jost',sans-serif"}}>{payoutDone?"Your payout — received":"Your payout — coming up"}</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:52,fontWeight:700,color:"white",lineHeight:1}}>
          <span style={{fontSize:26,color:"var(--gold-light)",verticalAlign:"top",marginTop:10,display:"inline-block"}}>$</span>{getPotValue().toLocaleString()}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginTop:14,paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.12)"}}>
          <div style={{width:32,height:32,borderRadius:8,background:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{payoutDone?"✓":isPayoutNow?payoutIcon:"📅"}</div>
          <div>
            <div style={{fontSize:14,fontWeight:500,color:"white",fontFamily:"'Jost',sans-serif"}}>{payoutDate}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:1,fontFamily:"'Jost',sans-serif"}}>
              {payoutDone?"Disbursed — thank you for your trust":isPayoutNow?"This round — your payout is coming":`${member.pi-OPEN_ROUND} round${member.pi-OPEN_ROUND!==1?"s":""} away`}
            </div>
          </div>
          <div style={{marginLeft:"auto",background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:12,padding:"6px 12px",fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600,color:"var(--gold-light)",flexShrink:0}}>Slot {member.pi+1}</div>
        </div>
      </div>

      {/* Open round banner */}
      {isPayoutNow ? (
        <div style={{margin:"14px var(--pad) 0",borderRadius:18,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,border:"1.5px solid var(--green)",background:"var(--surface)"}}>
          <div style={{width:44,height:44,borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,background:"var(--green-bg)"}}>{payoutIcon}</div>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600,color:"var(--text)"}}>Your payout round!</div>
            <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>Feb 27 · ${getPotValue().toLocaleString()} coming to you</div>
          </div>
          <div style={{marginLeft:"auto",fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:"var(--green)",flexShrink:0}}>${getPotValue().toLocaleString()}</div>
        </div>
      ):(
        <div style={{margin:"14px var(--pad) 0",borderRadius:18,padding:"16px 18px",display:"flex",alignItems:"center",gap:14,border:`1.5px solid ${openPaid?"var(--green)":"var(--accent)"}`,background:"var(--surface)"}}>
          <div style={{width:44,height:44,borderRadius:13,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0,background:openPaid?"var(--green-bg)":"var(--accent-pale)"}}>{openPaid?"✓":"💳"}</div>
          <div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600,color:"var(--text)"}}>{openPaid?`Round ${OPEN_ROUND+1} — paid`:`Round ${OPEN_ROUND+1} — open now`}</div>
            <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>{openPaid?`${getDateLabels()[OPEN_ROUND]} · Thank you!`:`Due ${getDateLabels()[OPEN_ROUND]} · Send via ${member.pay}`}</div>
          </div>
          <div style={{marginLeft:"auto",fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,flexShrink:0,color:openPaid?"var(--green)":"var(--primary)"}}>{openPaid?"✓":"$"+getGroup().handAmount}</div>
        </div>
      )}

      {/* Payment history */}
      <div style={{padding:"24px var(--pad) 0"}}>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"var(--text-soft)",marginBottom:14,fontFamily:"'Jost',sans-serif"}}>Your payment history</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(68px, 1fr))",gap:8}}>
          {getDateLabels().map((d,di)=>{
            const [mon,day]=d.split(" ");
            const isPayoutSlot=member.pi===di;
            const paid=isPaid(member.id,di);
            const status=isPayoutSlot?"payout":di<OPEN_ROUND?"paid":di===OPEN_ROUND?"open":"future";
            return (
              <div key={di} style={{background:status==="payout"?"var(--header-grad)":status==="future"?"var(--bg)":"var(--surface)",borderRadius:14,padding:"10px 6px 8px",border:`1px ${status==="open"?"dashed":"solid"} ${status==="payout"?"transparent":status==="open"?"var(--gold)":"var(--border)"}`,textAlign:"center"}}>
                <div style={{fontSize:8,fontWeight:700,letterSpacing:"0.5px",textTransform:"uppercase",color:status==="payout"?"rgba(255,255,255,0.6)":"var(--text-soft)",marginBottom:4,fontFamily:"'Jost',sans-serif"}}>{mon}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:status==="payout"?"white":status==="future"?"var(--text-soft)":"var(--primary)",lineHeight:1,opacity:status==="future"?0.6:1}}>{day}</div>
                <div style={{marginTop:5,display:"flex",justifyContent:"center"}}>
                  {isPayoutSlot
                    ? <span style={{fontSize:13,lineHeight:1}}>{payoutIcon}</span>
                    : status==="paid"
                      ? <div style={{width:16,height:16,borderRadius:"50%",background:"var(--green)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"white",fontWeight:700}}>✓</div>
                      : status==="open"
                        ? paid
                          ? <div style={{width:16,height:16,borderRadius:"50%",background:"var(--green)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"white",fontWeight:700}}>✓</div>
                          : <div style={{width:16,height:16,borderRadius:"50%",border:"1.5px dashed var(--gold)"}}/>
                        : <div style={{width:16,height:16,borderRadius:"50%",border:"1.5px solid var(--border)"}}/>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* My Payment Dates */}
      <div style={{padding:"24px var(--pad) 0"}}>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:"2.5px",textTransform:"uppercase",color:"var(--text-soft)",marginBottom:14,fontFamily:"'Jost',sans-serif"}}>My payment dates</div>
        <div className="resp-grid" style={{display:"flex",flexDirection:"column",gap:8}}>
          {getDateLabels().map((d,di)=>{
            const isPayoutSlot = member.pi===di;
            const paid = isPaid(member.id, di);
            const status = isPayoutSlot?"payout":di<OPEN_ROUND?"paid":di===OPEN_ROUND?(paid?"paid":"open"):"upcoming";
            const statusLabel = isPayoutSlot?"Your payout 🎉":status==="paid"?"Paid":status==="open"?"Due now":"Upcoming";
            const amountLabel = isPayoutSlot?`+$${getPotValue().toLocaleString()}`:`-$${getGroup().handAmount}`;
            const amountColor = isPayoutSlot?"var(--green)":status==="paid"?"var(--text-soft)":status==="open"?"var(--primary)":"var(--text-soft)";
            const rowBg = isPayoutSlot?"var(--accent-pale)":status==="open"?"var(--surface)":"var(--surface)";
            const borderColor = isPayoutSlot?"var(--accent)":status==="open"?"var(--gold)":"var(--border)";
            const iconBg = isPayoutSlot?"var(--header-grad)":status==="paid"?"var(--green-bg)":status==="open"?"var(--accent-pale)":"var(--bg-mid)";
            const iconColor = isPayoutSlot?"white":status==="paid"?"var(--green)":"var(--text-soft)";
            const iconContent = isPayoutSlot?payoutIcon:status==="paid"||paid?"✓":di+1;
            return (
              <div key={di} style={{background:rowBg,borderRadius:16,padding:"13px 16px",border:`1px solid ${borderColor}`,display:"flex",alignItems:"center",gap:14,position:"relative",overflow:"hidden"}}>
                {isPayoutSlot&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:"var(--shimmer)"}}/>}
                <div style={{width:36,height:36,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:isPayoutSlot?18:status==="paid"||paid?14:13,fontWeight:700,flexShrink:0,background:iconBg,color:iconColor,fontFamily:"'Cormorant Garamond',serif"}}>
                  {iconContent}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:600,color:"var(--text)"}}>{d}</div>
                  <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>{statusLabel}</div>
                </div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700,color:amountColor,flexShrink:0}}>{amountLabel}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Onboarding link */}
      <div onClick={goToOnboard} style={{margin:"16px var(--pad) 0",background:"var(--surface)",borderRadius:18,padding:"16px 18px",border:"1px solid var(--border)",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
        <div style={{width:38,height:38,borderRadius:11,background:"var(--accent-pale)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>✦</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:600,color:"var(--primary)"}}>New to the circle?</div>
          <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>Submit your preferences to join</div>
        </div>
        <div style={{fontSize:14,color:"var(--text-soft)"}}>→</div>
      </div>

      {/* Footer */}
      <div style={{margin:"14px var(--pad) 0",background:"var(--surface)",borderRadius:18,padding:"18px 20px",border:"1px solid var(--border)",display:"flex",alignItems:"center",gap:14}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:600,color:"var(--primary)"}}>Pard<em style={{color:"var(--gold)"}}>na</em></div>
          <div style={{fontSize:11,color:"var(--text-soft)",marginTop:2,fontFamily:"'Jost',sans-serif"}}>{getGroup().name} · {new Date(getGroup().startDate).getFullYear()}–{new Date(getGroup().endDate).getFullYear()}</div>
        </div>
        <div onClick={()=>setShowMsg(true)} style={{marginLeft:"auto",fontSize:11,color:"var(--accent)",fontWeight:500,textAlign:"right",fontFamily:"'Jost',sans-serif",cursor:"pointer"}}>Questions?<br/><span style={{color:"var(--primary)",fontWeight:600,textDecoration:"underline",textUnderlineOffset:2}}>Contact your organizer</span></div>
      </div>

      {/* Message box */}
      {showMsg && (
        <div style={{margin:"14px var(--pad) 0",background:"var(--surface)",borderRadius:18,padding:"18px 18px 14px",border:"1px solid var(--border)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"var(--shimmer)",borderRadius:"18px 18px 0 0"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:600,color:"var(--text)"}}>Message your organizer</div>
            <div onClick={()=>setShowMsg(false)} style={{fontSize:16,color:"var(--text-soft)",cursor:"pointer",padding:"2px 6px"}}>✕</div>
          </div>
          <input value={msgName} onChange={e=>setMsgName(e.target.value)} placeholder="Your name" style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,padding:"9px 12px",fontSize:13,color:"var(--text)",fontFamily:"'Jost',sans-serif",marginBottom:10,outline:"none"}}/>
          <textarea value={msgText} onChange={e=>setMsgText(e.target.value)} placeholder="Type your question or message..." rows={3} style={{width:"100%",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,padding:"9px 12px",fontSize:13,color:"var(--text)",fontFamily:"'Jost',sans-serif",resize:"none",outline:"none",marginBottom:12}}/>
          <button onClick={()=>{if(!msgName.trim()||!msgText.trim()){showAlert("Please fill in your name and message");return;}submitMessage({name:msgName,message:msgText});setShowMsg(false);setMsgName("");setMsgText("");showAlert("Message sent to your organizer ✦");}} style={{width:"100%",background:"var(--header-grad)",border:"none",borderRadius:10,padding:"11px",fontFamily:"'Jost',sans-serif",fontSize:12,fontWeight:600,color:"white",cursor:"pointer",letterSpacing:"0.05em"}}>Send Message</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
